<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>書き順アニメーション - Phase4 履歴＆スタンプ</title>
  <style>
    body {
      font-family: 'Yu Gothic', '游ゴシック', sans-serif;
      text-align: center;
      background: #faf8f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #4a4a4a; }
    .container {
      max-width: 500px; margin: 0 auto; background: white;
      border-radius: 24px; padding: 30px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      position: relative;
    }
    .kana-display {
      width: 250px; height: 250px; margin: 20px auto; background: #fffef9;
      border: 3px dashed #e0d6c2; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; position: relative;
      transition: background 0.3s;
    }
    .kana-display.hidden-char { background: #f0ebe0; border-color: #ff9800; }
    .kana-display svg {
      width: 200px; height: 200px; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); pointer-events: none;
    }
    .kana-display.hidden-char svg { opacity: 0.08; filter: blur(4px); }
    #drawCanvas {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 200px; height: 200px; touch-action: none; display: none; z-index: 10;
    }
    .info { font-size: 1.4rem; margin: 10px 0; min-height: 30px; transition: 0.2s; }
    .feedback { font-size: 1.1rem; min-height: 24px; margin: 5px 0; }
    .stroke-counter { font-size: 1rem; color: #888; }
    button {
      background: #f0e6d3; border: none; padding: 12px 28px; font-size: 1.2rem;
      border-radius: 40px; margin: 8px; cursor: pointer; font-weight: bold;
      color: #5a4a3a; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #e0d6c2; min-width: 44px; min-height: 44px;
    }
    button:hover { background: #e8d9be; }
    button:active { background: #d4c3a5; transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: default; }
    .speed-btn {
      padding: 8px 16px; font-size: 0.9rem; margin: 4px; background: #fff;
      border: 1px solid #d4c3a5;
    }
    .speed-btn.active { background: #d4c3a5; color: white; border-color: #b8a080; }
    .controls { margin: 20px 0; }
    .mode-selector {
      margin: 10px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 8px 16px; font-size: 0.9rem; background: #fff;
      border: 2px solid #e0d6c2; border-radius: 20px; cursor: pointer; transition: 0.2s;
      font-weight: normal;
    }
    .mode-btn.active { background: #ff9800; color: white; border-color: #f57c00; }
    .char-select-area { margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .selected-char-display {
      font-size: 2.2rem; font-weight: bold; margin: 0 10px; vertical-align: middle;
      color: #5a4a3a; min-width: 60px; display: inline-block;
    }
    .footer { margin-top: 30px; font-size: 0.85rem; color: #aaa; }
    .listen-btn { background: #ff9800; color: white; border-color: #f57c00; font-size: 1rem; }
    .listen-btn:hover { background: #f57c00; }
    .reveal-btn { background: #2196f3; color: white; border-color: #1976d2; font-size: 0.9rem; }
    .next-char-btn { background: #4caf50; color: white; border-color: #388e3c; }
    .number-toggle.locked { opacity: 0.5; pointer-events: none; }
    .number-toggle.locked label { cursor: not-allowed; }
    .mode-hint-text { font-size: 0.8rem; color: #e67e22; margin-top: 2px; display: none; }
    .number-toggle.locked .mode-hint-text { display: block; }

    /* 五十音表モーダル */
    .modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; border-radius: 20px; padding: 20px;
      max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: modalFadeIn 0.3s;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px;
    }
    .modal-header h2 { margin: 0; font-size: 1.5rem; color: #5a4a3a; }
    .modal-close {
      background: none; border: none; font-size: 1.8rem; cursor: pointer;
      color: #888; padding: 0 8px;
    }
    .tab-container {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 10px;
    }
    .tab-btn {
      padding: 6px 14px; font-size: 0.9rem; background: #f0e6d3;
      border: 1px solid #d4c3a5; border-radius: 20px; cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active { background: #ff9800; color: white; border-color: #f57c00; }
    .sub-tab-container {
      display: flex; justify-content: center; gap: 6px; margin-bottom: 12px;
    }
    .sub-tab-btn {
      padding: 4px 10px; font-size: 0.8rem; background: #fff;
      border: 1px solid #ccc; border-radius: 16px; cursor: pointer;
    }
    .sub-tab-btn.active { background: #4caf50; color: white; border-color: #388e3c; }
    .kana-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
      margin: 10px 0;
    }
    .kana-btn {
      background: #fff; border: 2px solid #e0d6c2; border-radius: 12px;
      padding: 10px 5px; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
      font-weight: bold; color: #5a4a3a;
    }
    .kana-btn:hover { background: #f5f0e8; }
    .kana-btn.selected { background: #ff9800; color: white; border-color: #f57c00; }
    .modal-select-btn {
      background: #4caf50; color: white; border: none; padding: 12px 30px;
      font-size: 1.2rem; border-radius: 30px; margin-top: 15px; cursor: pointer;
      font-weight: bold; width: 100%;
    }

    /* 結果表示ポップアップ */
    .result-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;
    }
    .result-card {
      background: white; border-radius: 30px; padding: 30px; text-align: center;
      max-width: 320px; width: 80%; animation: popIn 0.4s;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .stamp-emoji { font-size: 5rem; }
    .result-message { font-size: 1.5rem; margin: 10px 0; }
    .result-detail { font-size: 1rem; color: #666; margin: 10px 0; }
    .history-list {
      max-height: 300px; overflow-y: auto; text-align: left; margin-top: 10px;
    }
    .history-item {
      display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #eee;
    }
    .history-thumb {
      width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 8px; object-fit: contain;
    }
    .history-char { font-size: 1.2rem; font-weight: bold; }
    .history-stamp { font-size: 1.5rem; }
    .clear-history-btn {
      background: #e74c3c; color: white; border-color: #c0392b; font-size: 0.9rem; padding: 6px 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ 書き順アニメーション</h1>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="select">📋 えらんでかく</button>
      <button class="mode-btn" data-mode="sequential">🔢 じゅんばんに</button>
      <button class="mode-btn" data-mode="random">🎲 おまかせ</button>
    </div>

    <div class="char-select-area" id="charSelectArea">
      <button id="openKanaTableBtn">🔡 文字をえらぶ</button>
      <span class="selected-char-display" id="selectedCharDisplay"></span>
      <button id="showBtn">表示</button>
    </div>

    <div class="kana-display" id="svgContainer">
      <p style="color:#ccc;" id="placeholderText">文字を選んでね</p>
    </div>

    <div class="number-toggle" id="numberToggleArea" style="margin:8px 0;">
      <label style="font-size:0.95rem; color:#666; cursor:pointer; user-select:none;">
        <input type="checkbox" id="showNumbersCheckbox" checked style="vertical-align:middle; margin-right:4px;">
        🔢 画数を表示
      </label>
      <div class="mode-hint-text">⚠️ 書き順チェック中は番号を表示できません</div>
    </div>

    <div class="info" id="infoText"></div>
    <div class="feedback" id="feedbackText"></div>
    <div class="stroke-counter" id="strokeInfo"></div>

    <div id="speedControl" style="margin:10px 0;">
      <span style="font-size:0.9rem; color:#888;">⚡ はやさ：</span>
      <button class="speed-btn" data-speed="slow">🐢 ゆっくり</button>
      <button class="speed-btn active" data-speed="normal">🐇 ふつう</button>
      <button class="speed-btn" data-speed="fast">🐆 はやい</button>
    </div>

    <div class="controls">
      <button id="nextBtn">次の画 ▶</button>
      <br>
      <button id="traceHintBtn">🖊 なぞり練習</button>
      <button id="traceCheckBtn">🔍 書き順チェック</button>
      <button id="listenTraceBtn" style="display:none;">🔊 おとをきいてかく</button>
      <button id="revealCharBtn" style="display:none;" class="reveal-btn">👀 こたえをみる</button>
      <button id="nextCharBtn" style="display:none;" class="next-char-btn">▶ つぎのもんだい</button>
      <button id="retryTracingBtn" style="display:none;">🔄 もう一度</button>
      <button id="replaySoundBtn" style="display:none;" class="listen-btn">🔊 もういちどきく</button>
      <br>
      <button id="historyBtn">📋 れんしゅうのきろく</button>
    </div>
  </div>

  <!-- 五十音表モーダル -->
  <div class="modal" id="kanaModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔡 もじをえらんでね</h2>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="tab-container">
        <button class="tab-btn active" data-kana-type="hiragana">ひらがな</button>
        <button class="tab-btn" data-kana-type="katakana">カタカナ</button>
      </div>
      <div class="sub-tab-container" id="subTabContainer">
        <button class="sub-tab-btn active" data-sub-type="basic">せいおん</button>
        <button class="sub-tab-btn" data-sub-type="dakuten">だくおん</button>
        <button class="sub-tab-btn" data-sub-type="handakuten">はんだくおん</button>
      </div>
      <div class="kana-grid" id="kanaGrid"></div>
      <button class="modal-select-btn" id="modalSelectBtn">これにする</button>
    </div>
  </div>

  <!-- 結果表示ポップアップ -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="stamp-emoji" id="stampEmoji"></div>
      <div class="result-message" id="resultMessage"></div>
      <div class="result-detail" id="resultDetail"></div>
      <img id="resultThumb" style="max-width:120px; margin:10px auto; display:none; border:1px solid #ddd; border-radius:10px;" />
      <br>
      <button id="closeResultBtn">とじる</button>
    </div>
  </div>

  <!-- 履歴モーダル -->
  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 れんしゅうのきろく</h2>
        <button class="modal-close" id="historyCloseBtn">&times;</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <button class="clear-history-btn" id="clearHistoryBtn">ぜんぶけす</button>
    </div>
  </div>

  <div class="footer">made with ❤️</div>

  <script>
    (function() {
      // ===== GitHub Pages パス対応 =====
      const pathParts = window.location.pathname.split('/');
      const repoName = pathParts.length > 2 ? pathParts[1] : '';
      const BASE_PATH = repoName ? `/${repoName}` : '';

      const kanaMap = [
        "あ,3042","い,3044","う,3046","え,3048","お,304A",
        "か,304B","き,304D","く,304F","け,3051","こ,3053",
        "さ,3055","し,3057","す,3059","せ,305B","そ,305D",
        "た,305F","ち,3061","つ,3064","て,3066","と,3068",
        "な,306A","に,306B","ぬ,306C","ね,306D","の,306E",
        "は,306F","ひ,3072","ふ,3075","へ,3078","ほ,307B",
        "ま,307E","み,307F","む,3080","め,3081","も,3082",
        "や,3084","ゆ,3086","よ,3088",
        "ら,3089","り,308A","る,308B","れ,308C","ろ,308D",
        "わ,308F","を,3092","ん,3093",
        "が,304C","ぎ,304E","ぐ,3050","げ,3052","ご,3054",
        "ざ,3056","じ,3058","ず,305A","ぜ,305C","ぞ,305E",
        "だ,3060","ぢ,3062","づ,3065","で,3067","ど,3069",
        "ば,3070","び,3073","ぶ,3076","べ,3079","ぼ,307C",
        "ぱ,3071","ぴ,3074","ぷ,3077","ぺ,307A","ぽ,307D",
        "ア,30A2","イ,30A4","ウ,30A6","エ,30A8","オ,30AA",
        "カ,30AB","キ,30AD","ク,30AF","ケ,30B1","コ,30B3",
        "サ,30B5","シ,30B7","ス,30B9","セ,30BB","ソ,30BD",
        "タ,30BF","チ,30C1","ツ,30C4","テ,30C6","ト,30C8",
        "ナ,30CA","ニ,30CB","ヌ,30CC","ネ,30CD","ノ,30CE",
        "ハ,30CF","ヒ,30D2","フ,30D5","ヘ,30D8","ホ,30DB",
        "マ,30DE","ミ,30DF","ム,30E0","メ,30E1","モ,30E2",
        "ヤ,30E4","ユ,30E6","ヨ,30E8",
        "ラ,30E9","リ,30EA","ル,30EB","レ,30EC","ロ,30ED",
        "ワ,30EF","ヲ,30F2","ン,30F3",
        "ガ,30AC","ギ,30AE","グ,30B0","ゲ,30B2","ゴ,30B4",
        "ザ,30B6","ジ,30B8","ズ,30BA","ゼ,30BC","ゾ,30BE",
        "ダ,30C0","ヂ,30C2","ヅ,30C5","デ,30C7","ド,30C9",
        "バ,30D0","ビ,30D3","ブ,30D6","ベ,30D9","ボ,30DC",
        "パ,30D1","ピ,30D4","プ,30D7","ペ,30DA","ポ,30DD"
      ];

      // 五十音グリッド用データ
      const hiraganaBasic = [
        ["あ","い","う","え","お"],
        ["か","き","く","け","こ"],
        ["さ","し","す","せ","そ"],
        ["た","ち","つ","て","と"],
        ["な","に","ぬ","ね","の"],
        ["は","ひ","ふ","へ","ほ"],
        ["ま","み","む","め","も"],
        ["や","","ゆ","","よ"],
        ["ら","り","る","れ","ろ"],
        ["わ","","","を","ん"]
      ];
      const hiraganaDakuten = [
        ["が","ぎ","ぐ","げ","ご"],
        ["ざ","じ","ず","ぜ","ぞ"],
        ["だ","ぢ","づ","で","ど"],
        ["ば","び","ぶ","べ","ぼ"]
      ];
      const hiraganaHandakuten = [
        ["ぱ","ぴ","ぷ","ぺ","ぽ"]
      ];
      const katakanaBasic = [
        ["ア","イ","ウ","エ","オ"],
        ["カ","キ","ク","ケ","コ"],
        ["サ","シ","ス","セ","ソ"],
        ["タ","チ","ツ","テ","ト"],
        ["ナ","ニ","ヌ","ネ","ノ"],
        ["ハ","ヒ","フ","ヘ","ホ"],
        ["マ","ミ","ム","メ","モ"],
        ["ヤ","","ユ","","ヨ"],
        ["ラ","リ","ル","レ","ロ"],
        ["ワ","","","ヲ","ン"]
      ];
      const katakanaDakuten = [
        ["ガ","ギ","グ","ゲ","ゴ"],
        ["ザ","ジ","ズ","ゼ","ゾ"],
        ["ダ","ヂ","ヅ","デ","ド"],
        ["バ","ビ","ブ","ベ","ボ"]
      ];
      const katakanaHandakuten = [
        ["パ","ピ","プ","ペ","ポ"]
      ];

      let quizMode = 'select';
      let currentQuizIndex = 0;
      let isListeningMode = false;
      let characterHidden = false;
      let speechSynthesis = window.speechSynthesis;
      let currentChar = 'あ';
      let currentUnicode = '3042';

      let currentSvgDoc = null;
      let strokePaths = [];
      let strokeSamplePoints = [];
      let currentStrokeIndex = -1;
      let animationSpeed = 'normal';
      let isAnimating = false;

      let practiceMode = 'none';
      let expectedStrokeIndex = 0;
      let userDrawnPoints = [];
      let savedStrokes = [];
      let feedbackTimer = null;

      // 成績用
      let strokeRatings = []; // 'good', 'ok', 'poor'

      const STROKE_LINE_COLORS = ['#ff6fa5', '#2196f3', '#4caf50', '#ff9800', '#9c27b0', '#111111'];
      function getStrokeLineColor(idx) {
        return STROKE_LINE_COLORS[idx] !== undefined ? STROKE_LINE_COLORS[idx] : '#111111';
      }
      function getStrokeNumberColor(idx) {
        return idx === 0 ? '#ff6fa5' : '#2196f3';
      }
      let showStrokeNumbers = true;
      let strokeNumbersLocked = false;

      const speedBaseDurations = { slow: 2000, normal: 800, fast: 300 };
      const BASE_LENGTH = 200;
      const MIN_DURATION = 100;

      const DISTANCE_THRESHOLD_GOOD = 12;
      const DISTANCE_THRESHOLD_OK = 25;
      const START_DISTANCE_THRESHOLD = 30;
      const MATCH_DISTANCE_THRESHOLD = 35;
      const COVERAGE_THRESHOLD_GOOD = 0.7;
      const COVERAGE_THRESHOLD_OK = 0.5;
      const LENGTH_RATIO_MIN = 0.3;

      // DOM
      const showBtn = document.getElementById('showBtn');
      const svgContainer = document.getElementById('svgContainer');
      const infoText = document.getElementById('infoText');
      const feedbackText = document.getElementById('feedbackText');
      const strokeInfo = document.getElementById('strokeInfo');
      const nextBtn = document.getElementById('nextBtn');
      const speedControl = document.getElementById('speedControl');
      const speedBtns = document.querySelectorAll('.speed-btn');
      const traceHintBtn = document.getElementById('traceHintBtn');
      const traceCheckBtn = document.getElementById('traceCheckBtn');
      const listenTraceBtn = document.getElementById('listenTraceBtn');
      const revealCharBtn = document.getElementById('revealCharBtn');
      const nextCharBtn = document.getElementById('nextCharBtn');
      const retryTracingBtn = document.getElementById('retryTracingBtn');
      const replaySoundBtn = document.getElementById('replaySoundBtn');
      const showNumbersCheckbox = document.getElementById('showNumbersCheckbox');
      const numberToggleArea = document.getElementById('numberToggleArea');
      const charSelectArea = document.getElementById('charSelectArea');
      const modeBtns = document.querySelectorAll('.mode-btn');
      const placeholderText = document.getElementById('placeholderText');
      const openKanaTableBtn = document.getElementById('openKanaTableBtn');
      const selectedCharDisplay = document.getElementById('selectedCharDisplay');
      const modal = document.getElementById('kanaModal');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const kanaGrid = document.getElementById('kanaGrid');
      const modalSelectBtn = document.getElementById('modalSelectBtn');
      const tabBtns = document.querySelectorAll('.tab-btn');
      const subTabContainer = document.getElementById('subTabContainer');
      const historyBtn = document.getElementById('historyBtn');
      const historyModal = document.getElementById('historyModal');
      const historyCloseBtn = document.getElementById('historyCloseBtn');
      const historyList = document.getElementById('historyList');
      const clearHistoryBtn = document.getElementById('clearHistoryBtn');
      const resultOverlay = document.getElementById('resultOverlay');
      const stampEmoji = document.getElementById('stampEmoji');
      const resultMessage = document.getElementById('resultMessage');
      const resultDetail = document.getElementById('resultDetail');
      const resultThumb = document.getElementById('resultThumb');
      const closeResultBtn = document.getElementById('closeResultBtn');
      
      let canvas, ctx;
      let isDrawing = false;
      let isFlashing = false;

      // 五十音表モーダル関連
      let selectedModalChar = null;
      let selectedModalCode = null;
      let currentKanaType = 'hiragana';
      let currentSubType = 'basic';

      function getCodeForChar(char) {
        const entry = kanaMap.find(item => item.startsWith(char + ','));
        return entry ? entry.split(',')[1] : null;
      }

      function openModal() {
        selectedModalChar = currentChar;
        selectedModalCode = currentUnicode;
        modal.style.display = 'flex';
        renderGrid();
      }
      function closeModal() {
        modal.style.display = 'none';
      }
      modalCloseBtn.addEventListener('click', closeModal);
      window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          tabBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentKanaType = this.dataset.kanaType;
          currentSubType = 'basic';
          document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelector('.sub-tab-btn[data-sub-type="basic"]').classList.add('active');
          renderGrid();
        });
      });
      subTabContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('sub-tab-btn')) {
          document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentSubType = e.target.dataset.subType;
          renderGrid();
        }
      });

      function getGridData() {
        if (currentKanaType === 'hiragana') {
          if (currentSubType === 'basic') return hiraganaBasic;
          if (currentSubType === 'dakuten') return hiraganaDakuten;
          if (currentSubType === 'handakuten') return hiraganaHandakuten;
        } else {
          if (currentSubType === 'basic') return katakanaBasic;
          if (currentSubType === 'dakuten') return katakanaDakuten;
          if (currentSubType === 'handakuten') return katakanaHandakuten;
        }
        return [];
      }

      function renderGrid() {
        const gridData = getGridData();
        kanaGrid.innerHTML = '';
        gridData.forEach(row => {
          row.forEach(char => {
            if (char === '') {
              const emptyDiv = document.createElement('div');
              kanaGrid.appendChild(emptyDiv);
              return;
            }
            const btn = document.createElement('button');
            btn.className = 'kana-btn';
            btn.textContent = char;
            const code = getCodeForChar(char);

      // SVG読み込み

      function samplePath(path, step = 5) {

          const cov = calcCoverage(drawnPoints, strokeSamplePoints[i], 15);

      function parseViewBox(svgRoot) {
        const vb = svgRoot.getAttribute('viewBox');
        if (vb) {

          if (parts.length === 4 && parts.every(n => !isNaN(n))) {

          text.textContent = String(idx + 1);

      function setupCanvas() {
        if (!canvas) return;

        if (viewBox) {

        isAnimating = false; updateUI();
      }
      function updateUI() {
        if (!strokePaths.length) { infoText.textContent = 'ストロークが見つかりません'; return; }
        if (practiceMode !== 'none') {
          const displayIndex = Math.min(expectedStrokeIndex + 1, strokePaths.length);
          let label = 'なぞり中';
          if (practiceMode === 'listen') label = 'おとをきいてかく';
          else if (practiceMode === 'check') label = '書き順チェック';
          infoText.textContent = `✏️ ${label}：${displayIndex} / ${strokePaths.length} 画め`;
          strokeInfo.textContent = `全 ${strokePaths.length} 画`;
          nextBtn.style.display = 'none'; speedControl.style.display = 'none';
          retryTracingBtn.style.display = 'inline-block';
        } else {
          const cur = currentStrokeIndex + 1;
          infoText.textContent = `✏️ ${cur} / ${strokePaths.length} 画`;
          strokeInfo.textContent = `全 ${strokePaths.length} 画`;
          nextBtn.style.display = 'inline-block'; nextBtn.disabled = isAnimating;
          speedControl.style.display = 'block';
          retryTracingBtn.style.display = 'none';
        }
      }

      // リスニングモード
      async function loadSvgAndPrepare(unicode) {
        const svgDoc = await loadSvg(unicode);
        currentSvgDoc = svgDoc;
        if (!svgDoc) return;
        strokePaths = extractStrokes(svgDoc);
        displaySvg(svgDoc);
        if (characterHidden) svgContainer.classList.add('hidden-char');
      }
      function startListeningMode() {
        calculateAllSamplePoints();
        practiceMode = 'listen'; isListeningMode = true;
        expectedStrokeIndex = 0; userDrawnPoints = []; savedStrokes = []; strokeRatings = [];
        lockStrokeNumbers(false);
        strokePaths.forEach(p => {
          p.style.display = 'block'; p.style.stroke = '#d0d0d0'; p.style.strokeWidth = '9';
          p.style.transition = 'none'; p.style.strokeDasharray = 'none'; p.style.strokeDashoffset = '0';
        });
        hideCharacter(); speakCharacter(currentChar);
        canvas.style.display = 'block'; retryTracingBtn.style.display = 'inline-block';
        if (quizMode !== 'select') nextCharBtn.style.display = 'inline-block';
        setupCanvas(); isAnimating = false; updateUI(); attachDrawEvents();
        setFeedback('🔊 おとをきいて、かいてね');
      }
      function exitListeningMode() {
        isListeningMode = false; characterHidden = false;
        svgContainer.classList.remove('hidden-char');
        revealCharBtn.style.display = 'none'; replaySoundBtn.style.display = 'none'; nextCharBtn.style.display = 'none';
        lockStrokeNumbers(false);
        canvas.style.display = 'none'; retryTracingBtn.style.display = 'none';
        ctx.clearRect(0,0,canvas.width,canvas.height);
        strokePaths.forEach(p => { p.style.display = 'none'; });
        applyStrokeColors(strokePaths);
        practiceMode = 'none'; currentStrokeIndex = -1; isAnimating = false;
        updateUI(); removeDrawEvents(); clearFeedback();
      }

      // 結果表示と保存
      function finishCharacter() {
        const goodCount = strokeRatings.filter(r => r === 'good').length;
        const total = strokePaths.length;
        let stamp = '';
        let message = '';
        if (goodCount === total) { stamp = '🌟'; message = 'パーフェクト！'; }
        else if (goodCount >= total * 0.7) { stamp = '👍'; message = 'よくできました！'; }
        else if (goodCount >= 1) { stamp = '😊'; message = 'がんばったね！'; }
        else { stamp = '💪'; message = 'もうすこし！'; }
        // 結果ポップアップ表示
        stampEmoji.textContent = stamp;
        resultMessage.textContent = message;
        resultDetail.textContent = `${currentChar}（${total}画中 ${goodCount}画 じょうず）`;
        // サムネイル保存
        const thumbData = canvas.toDataURL('image/png');
        resultThumb.src = thumbData;
        resultThumb.style.display = 'inline-block';
        resultOverlay.style.display = 'flex';
        // 履歴保存
        saveHistory({ char: currentChar, date: new Date().toLocaleString(), mode: practiceMode, rating: goodCount, total, stamp, thumb: thumbData });
        // 練習モードを抜ける
        exitPracticeMode();
      }

      closeResultBtn.addEventListener('click', () => {
        resultOverlay.style.display = 'none';
      });

      // localStorage履歴管理
      const HISTORY_KEY = 'kakijun_history';
      function getHistory() {
        try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
        catch { return []; }
      }
      function saveHistory(record) {
        let history = getHistory();
        history.unshift(record);
        if (history.length > 50) history = history.slice(0, 50); // 最大50件
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      }
      function clearHistory() {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
      }

      function renderHistory() {
        const history = getHistory();
        historyList.innerHTML = history.length === 0 ? '<p>きろくはまだないよ</p>' : '';
        history.forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
            <span class="history-char">${item.char}</span>
            <span class="history-stamp">${item.stamp}</span>
            <span style="font-size:0.8rem; color:#888;">${item.date}</span>
          `;
          if (item.thumb) {
            const img = document.createElement('img');
            img.className = 'history-thumb';
            img.src = item.thumb;
            div.prepend(img);
          }
          historyList.appendChild(div);
        });
      }

      historyBtn.addEventListener('click', () => {
        renderHistory();
        historyModal.style.display = 'flex';
      });
      historyCloseBtn.addEventListener('click', () => historyModal.style.display = 'none');
      window.addEventListener('click', (e) => { if (e.target === historyModal) historyModal.style.display = 'none'; });
      clearHistoryBtn.addEventListener('click', clearHistory);

      // その他のイベント
      modeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const mode = this.dataset.mode;
          setQuizMode(mode);
          if (practiceMode === 'listen') exitListeningMode();
          else if (practiceMode !== 'none') exitPracticeMode();
          if (mode !== 'select') { loadQuizChar(); loadAndDisplay(currentUnicode); }
        });
      });
      showBtn.addEventListener('click', () => {
        if (currentUnicode) loadAndDisplay(currentUnicode);
      });
      nextBtn.addEventListener('click', () => {
        if (practiceMode !== 'none' || isAnimating) return;
        if (currentStrokeIndex >= strokePaths.length - 1) animateToStroke(0);
        else animateToStroke(currentStrokeIndex + 1);
      });
      traceHintBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') { exitListeningMode(); enterPracticeMode('hint'); }
        else if (practiceMode === 'hint') exitPracticeMode();
        else if (practiceMode === 'check') { exitPracticeMode(); enterPracticeMode('hint'); }
        else enterPracticeMode('hint');
      });
      traceCheckBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') { exitListeningMode(); enterPracticeMode('check'); }
        else if (practiceMode === 'check') exitPracticeMode();
        else if (practiceMode === 'hint') { exitPracticeMode(); enterPracticeMode('check'); }
        else enterPracticeMode('check');
      });
      listenTraceBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') exitListeningMode();
        else { if (practiceMode !== 'none') exitPracticeMode(); enterListeningMode(); }
      });
      revealCharBtn.addEventListener('click', revealCharacter);
      nextCharBtn.addEventListener('click', async () => {
        if (practiceMode === 'listen') {
          ctx.clearRect(0,0,canvas.width,canvas.height);
          savedStrokes = []; expectedStrokeIndex = 0; userDrawnPoints = []; strokeRatings = [];
          updateHighlight(); updateUI();
          const code = loadQuizChar();
          await loadSvgAndPrepare(code);
          startListeningMode();
        } else {
          loadQuizChar();
          loadAndDisplay(currentUnicode);
        }
      });
      retryTracingBtn.addEventListener('click', () => {
        if (practiceMode === 'none') return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        savedStrokes = []; expectedStrokeIndex = 0; userDrawnPoints = []; strokeRatings = [];
        updateHighlight(); updateUI();
        if (practiceMode === 'listen') speakCharacter(currentChar);
      });
      replaySoundBtn.addEventListener('click', replaySound);
      showNumbersCheckbox.addEventListener('change', () => {
        if (strokeNumbersLocked) return;
        showStrokeNumbers = showNumbersCheckbox.checked;
        updateStrokeNumbersVisibility();
      });
      document.addEventListener('keydown', (e) => {
        if (practiceMode !== 'none' || isAnimating || isFlashing) return;
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (currentStrokeIndex >= strokePaths.length - 1) animateToStroke(0);
          else animateToStroke(currentStrokeIndex + 1);
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (currentStrokeIndex > 0) animateToStroke(currentStrokeIndex - 1);
        }
      });
      speedBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          speedBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          animationSpeed = this.dataset.speed;
        });
      });

      async function loadAndDisplay(unicode) {
        if (practiceMode !== 'none') exitPracticeMode();
        isAnimating = false;
        const svgDoc = await loadSvg(unicode);
        currentSvgDoc = svgDoc;
        if (!svgDoc) { svgContainer.innerHTML = '<p style="color:#ccc;">SVGが見つかりませんでした</p>'; strokePaths = []; updateUI(); return; }
        strokePaths = extractStrokes(svgDoc);
        displaySvg(svgDoc);
        if (strokePaths.length > 0) { currentStrokeIndex = -1; animateToStroke(0); }
        else updateUI();
      }

      // 初期化
      function init() {
        selectedCharDisplay.textContent = currentChar;
        setQuizMode('select');
        listenTraceBtn.style.display = 'inline-block';
        loadAndDisplay(currentUnicode);
      }
      init();
    })();
  </script>
</body>
</html>
