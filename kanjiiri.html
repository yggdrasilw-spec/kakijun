<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>書き順アニメーション - 全文字対応版</title>
  <style>
    body {
      font-family: 'Yu Gothic', '游ゴシック', sans-serif;
      text-align: center;
      background: #faf8f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #4a4a4a; }
    .container {
      max-width: 500px; margin: 0 auto; background: white;
      border-radius: 24px; padding: 30px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      position: relative;
    }
    .kana-display {
      width: 250px; height: 250px; margin: 20px auto; background: #fffef9;
      border: 3px dashed #e0d6c2; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; position: relative;
      transition: background 0.3s;
    }
    .kana-display.hidden-char { background: #f0ebe0; border-color: #ff9800; }
    .kana-display svg {
      width: 200px; height: 200px; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); pointer-events: none;
    }
    .kana-display.hidden-char svg { opacity: 0.08; filter: blur(4px); }
    #drawCanvas {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 200px; height: 200px; touch-action: none; display: none; z-index: 10;
    }
    .info { font-size: 1.4rem; margin: 10px 0; min-height: 30px; transition: 0.2s; }
    .feedback { font-size: 1.1rem; min-height: 24px; margin: 5px 0; }
    .stroke-counter { font-size: 1rem; color: #888; }
    button {
      background: #f0e6d3; border: none; padding: 12px 28px; font-size: 1.2rem;
      border-radius: 40px; margin: 8px; cursor: pointer; font-weight: bold;
      color: #5a4a3a; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #e0d6c2; min-width: 44px; min-height: 44px;
    }
    button:hover { background: #e8d9be; }
    button:active { background: #d4c3a5; transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: default; }
    .speed-btn {
      padding: 8px 16px; font-size: 0.9rem; margin: 4px; background: #fff;
      border: 1px solid #d4c3a5;
    }
    .speed-btn.active { background: #d4c3a5; color: white; border-color: #b8a080; }
    .controls { margin: 20px 0; }
    .mode-selector {
      margin: 10px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 8px 16px; font-size: 0.9rem; background: #fff;
      border: 2px solid #e0d6c2; border-radius: 20px; cursor: pointer; transition: 0.2s;
      font-weight: normal;
    }
    .mode-btn.active { background: #ff9800; color: white; border-color: #f57c00; }
    .char-select-area { margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .selected-char-display {
      font-size: 2.2rem; font-weight: bold; margin: 0 10px; vertical-align: middle;
      color: #5a4a3a; min-width: 60px; display: inline-block;
    }
    .footer { margin-top: 30px; font-size: 0.85rem; color: #aaa; }
    .listen-btn { background: #ff9800; color: white; border-color: #f57c00; font-size: 1rem; }
    .listen-btn:hover { background: #f57c00; }
    .reveal-btn { background: #2196f3; color: white; border-color: #1976d2; font-size: 0.9rem; }
    .next-char-btn { background: #4caf50; color: white; border-color: #388e3c; }
    .number-toggle.locked { opacity: 0.5; pointer-events: none; }
    .number-toggle.locked label { cursor: not-allowed; }
    .mode-hint-text { font-size: 0.8rem; color: #e67e22; margin-top: 2px; display: none; }
    .number-toggle.locked .mode-hint-text { display: block; }

    .custom-string-area {
      margin: 10px 0; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
    }
    #customStringInput {
      padding: 8px 12px; font-size: 1rem; border: 2px solid #e0d6c2; border-radius: 20px;
      width: 180px; text-align: center;
    }

    /* 五十音表モーダル */
    .modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; border-radius: 20px; padding: 20px;
      max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: modalFadeIn 0.3s;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px;
    }
    .modal-header h2 { margin: 0; font-size: 1.5rem; color: #5a4a3a; }
    .modal-close {
      background: none; border: none; font-size: 1.8rem; cursor: pointer;
      color: #888; padding: 0 8px;
    }
    .tab-container {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 10px;
    }
    .tab-btn {
      padding: 6px 14px; font-size: 0.9rem; background: #f0e6d3;
      border: 1px solid #d4c3a5; border-radius: 20px; cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active { background: #ff9800; color: white; border-color: #f57c00; }
    .sub-tab-container {
      display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .sub-tab-btn {
      padding: 4px 10px; font-size: 0.8rem; background: #fff;
      border: 1px solid #ccc; border-radius: 16px; cursor: pointer;
    }
    .sub-tab-btn.active { background: #4caf50; color: white; border-color: #388e3c; }
    .kana-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
      margin: 10px 0;
    }
    .kana-btn {
      background: #fff; border: 2px solid #e0d6c2; border-radius: 12px;
      padding: 10px 5px; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
      font-weight: bold; color: #5a4a3a;
    }
    .kana-btn:hover { background: #f5f0e8; }
    .kana-btn.selected { background: #ff9800; color: white; border-color: #f57c00; }
    .modal-select-btn {
      background: #4caf50; color: white; border: none; padding: 12px 30px;
      font-size: 1.2rem; border-radius: 30px; margin-top: 15px; cursor: pointer;
      font-weight: bold; width: 100%;
    }

    /* 結果表示ポップアップ */
    .result-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;
    }
    .result-card {
      background: white; border-radius: 30px; padding: 30px; text-align: center;
      max-width: 320px; width: 80%; animation: popIn 0.4s;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .stamp-emoji { font-size: 5rem; }
    .result-message { font-size: 1.5rem; margin: 10px 0; }
    .result-detail { font-size: 1rem; color: #666; margin: 10px 0; }
    .history-list {
      max-height: 300px; overflow-y: auto; text-align: left; margin-top: 10px;
    }
    .history-item {
      display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #eee;
    }
    .history-thumb {
      width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 8px; object-fit: contain;
    }
    .history-char { font-size: 1.2rem; font-weight: bold; }
    .history-stamp { font-size: 1.5rem; }
    .clear-history-btn {
      background: #e74c3c; color: white; border-color: #c0392b; font-size: 0.9rem; padding: 6px 16px;
    }

    /* ==================== レイアウト共通 ==================== */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    .app-grid { }
    .panel { }
    .single-practice-block { }

    /* ---- 五十音・かん字モーダルの高さ対策（一覧が切れる問題の修正） ---- */
    .modal-content {
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }
    .kana-grid {
      overflow-y: auto;
      max-height: 42vh;
      padding-right: 4px;
    }
    .char-search-area {
      display: flex; gap: 6px; margin-bottom: 10px;
    }
    #charSearchInput {
      flex: 1; padding: 8px 12px; font-size: 1rem; border: 2px solid #e0d6c2;
      border-radius: 20px; text-align: center;
    }
    .char-search-hint { font-size: 0.75rem; color: #999; margin: -6px 0 8px; }
    .search-result-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 8px;
    }
    .search-result-grid .kana-btn.no-svg { opacity: 0.35; cursor: not-allowed; }
    .search-empty-note { font-size: 0.85rem; color: #c0392b; margin: 4px 0; }

    .variant-row {
      display: none; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center;
      margin: 4px 0 10px; padding: 8px; background: #faf6ee; border-radius: 12px;
    }
    .variant-row.show { display: flex; }
    .variant-row .variant-label { font-size: 0.8rem; color: #888; margin-right: 2px; }
    .variant-chip {
      padding: 5px 12px; font-size: 0.8rem; background: #fff; border: 1px solid #d4c3a5;
      border-radius: 16px; cursor: pointer;
    }
    .variant-chip.active { background: #4a90d9; color: #fff; border-color: #3a78bd; }

    /* ==================== 文章れんしゅう（複数キャンバス） ==================== */
    .sentence-practice-area { display: none; flex-direction: column; margin-top: 10px; }
    .sp-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      gap: 8px; margin-bottom: 10px;
    }
    .sp-progress { font-size: 0.95rem; color: #5a4a3a; font-weight: bold; }
    .sp-pagination { display: flex; align-items: center; gap: 8px; }
    .sp-pagination button {
      padding: 6px 14px; font-size: 0.9rem; min-width: auto; min-height: auto;
    }
    .sp-page-label { font-size: 0.85rem; color: #888; min-width: 3.5em; text-align: center; }
    .sp-stop-btn { background: #e74c3c; color: #fff; border-color: #c0392b; font-size: 0.9rem; padding: 6px 16px; }
    .sp-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    .sp-card {
      position: relative; background: #fffef9; border: 2px solid #e0d6c2; border-radius: 16px;
      padding: 8px; display: flex; flex-direction: column; align-items: center;
    }
    .sp-card.completed { border-color: #4caf50; background: #f3fbf3; }
    .sp-card.nosvg { border-color: #ccc; background: #f5f5f5; }
    .sp-card-index {
      position: absolute; top: 4px; left: 6px; font-size: 0.7rem; color: #aaa; font-weight: bold;
    }
    .sp-card-display {
      width: 100%; max-width: 150px; aspect-ratio: 1/1; background: #fff;
      border: 2px dashed #e8e0d0; border-radius: 12px; position: relative;
      display: flex; align-items: center; justify-content: center; margin: 6px 0;
    }
    .sp-card-display svg { width: 88%; height: 88%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    .sp-card-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; height: 88%; touch-action: none; }
    .sp-card-nosvg-msg { font-size: 0.75rem; color: #bbb; text-align: center; padding: 6px; }
    .sp-card-progress { font-size: 0.75rem; color: #888; min-height: 1.1em; }
    .sp-card-btns { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
    .sp-card-btns button {
      padding: 4px 9px; font-size: 0.8rem; min-width: auto; min-height: auto; margin: 0;
    }
    .sp-card-stamp {
      position: absolute; top: -6px; right: -6px; font-size: 1.6rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
    }

    /* ==================== 横長画面（Chromebook 16:9 想定） ==================== */
    @media (orientation: landscape) and (min-width: 700px) {
      body { padding: 10px; overflow: hidden; }
      .container {
        max-width: 100%; width: 100%; height: calc(100vh - 20px);
        margin: 0; border-radius: 16px; padding: 14px 22px;
        display: flex; flex-direction: column; overflow: hidden;
      }
      h1 { font-size: 1.2rem; margin: 0 0 8px; flex: 0 0 auto; }
      .footer { display: none; }

      .app-grid {
        display: flex; flex-direction: row; gap: 22px; flex: 1 1 auto; min-height: 0;
      }
      .panel { display: flex; flex-direction: column; min-height: 0; }
      .panel-left {
        flex: 0 0 300px; overflow-y: auto; align-items: center; padding-right: 6px;
      }
      .panel-right {
        flex: 1 1 auto; overflow-y: auto; padding-left: 14px; border-left: 1px solid #f0ebe0;
      }
      .kana-display { width: 190px; height: 190px; margin: 10px auto; }
      .mode-selector { margin: 4px 0; }
      .char-select-area, .custom-string-area { margin: 6px 0; }
      .controls { margin: 10px 0; }
      button { padding: 9px 20px; font-size: 1.05rem; margin: 5px; min-width: 40px; min-height: 40px; }
      .speed-btn { padding: 6px 12px; font-size: 0.85rem; }

      .sentence-practice-area {
        flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; margin-top: 0;
      }
      .sp-grid {
        grid-template-columns: repeat(4, 1fr); flex: 1 1 auto; overflow-y: auto; align-content: start;
      }
      .sp-card-display { max-width: 130px; }

      .modal-content { max-width: min(760px, 90vw); }
      .kana-grid { grid-template-columns: repeat(10, 1fr); max-height: 56vh; }
      .search-result-grid { grid-template-columns: repeat(10, 1fr); }
    }

    /* とても横幅が狭いランドスケープ（小さめタブレット等）向けの調整 */
    @media (orientation: landscape) and (max-width: 699px) {
      .kana-grid { max-height: 34vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ 書き順アニメーション</h1>

    <div class="app-grid" id="appGrid">
    <div class="panel panel-left">
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="select">📋 えらんでかく</button>
      <button class="mode-btn" data-mode="sequential">🔢 じゅんばんに</button>
      <button class="mode-btn" data-mode="random">🎲 おまかせ</button>
    </div>

    <div class="char-select-area" id="charSelectArea">
      <button id="openKanaTableBtn">🔡 文字をえらぶ</button>
      <span class="selected-char-display" id="selectedCharDisplay"></span>
      <button id="showBtn">表示</button>
    </div>

    <div class="custom-string-area" id="customStringArea">
      <input type="text" id="customStringInput" placeholder="れんしゅうしたい もじ">
      <button id="startCustomStringBtn">▶ このもじでれんしゅう</button>
      <button id="stopCustomStringBtn" style="display:none;">⏹ おわる</button>
    </div>

    <div class="kana-display" id="svgContainer">
      <p style="color:#ccc;" id="placeholderText">文字を選んでね</p>
    </div>

    <div class="number-toggle" id="numberToggleArea" style="margin:8px 0;">
      <label style="font-size:0.95rem; color:#666; cursor:pointer; user-select:none;">
        <input type="checkbox" id="showNumbersCheckbox" checked style="vertical-align:middle; margin-right:4px;">
        🔢 画数を表示
      </label>
      <div class="mode-hint-text">⚠️ 書き順チェック中は番号を表示できません</div>
    </div>

    </div>
    <div class="panel panel-right">
    <div class="info" id="infoText"></div>
    <div class="feedback" id="feedbackText"></div>
    <div class="stroke-counter" id="strokeInfo"></div>

    <div id="speedControl" style="margin:10px 0;">
      <span style="font-size:0.9rem; color:#888;">⚡ はやさ：</span>
      <button class="speed-btn" data-speed="slow">🐢 ゆっくり</button>
      <button class="speed-btn active" data-speed="normal">🐇 ふつう</button>
      <button class="speed-btn" data-speed="fast">🐆 はやい</button>
    </div>

    <div class="controls">
      <button id="nextBtn">次の画 ▶</button>
      <br>
      <button id="traceHintBtn">🖊 なぞり練習</button>
      <button id="traceCheckBtn">🔍 書き順チェック</button>
      <button id="listenTraceBtn" style="display:none;">🔊 おとをきいてかく</button>
      <button id="revealCharBtn" style="display:none;" class="reveal-btn">👀 こたえをみる</button>
      <button id="nextCharBtn" style="display:none;" class="next-char-btn">▶ つぎのもんだい</button>
      <button id="retryTracingBtn" style="display:none;">🔄 もう一度</button>
      <button id="replaySoundBtn" style="display:none;" class="listen-btn">🔊 もういちどきく</button>
      <br>
      <button id="historyBtn">📋 れんしゅうのきろく</button>
    </div>
    </div>
    </div>

    <div class="sentence-practice-area" id="sentencePracticeArea">
      <div class="sp-header">
        <span class="sp-progress" id="spProgress"></span>
        <div class="sp-pagination">
          <button id="spPrevBtn">◀ 前</button>
          <span class="sp-page-label" id="spPageLabel"></span>
          <button id="spNextBtn">つぎ ▶</button>
        </div>
        <button class="sp-stop-btn" id="spStopBtn">⏹ おわる</button>
      </div>
      <div class="sp-grid" id="spGrid"></div>
    </div>
  </div>

  <!-- 五十音表モーダル -->
  <div class="modal" id="kanaModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔡 もじをえらんでね</h2>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="tab-container">
        <button class="tab-btn active" data-kana-type="hiragana">ひらがな</button>
        <button class="tab-btn" data-kana-type="katakana">カタカナ</button>
        <button class="tab-btn" data-kana-type="kanji">かん字</button>
      </div>
      <div class="char-search-area">
        <input type="text" id="charSearchInput" placeholder="🔍 文字で検索（例：薔薇）">
      </div>
      <div class="char-search-hint">常用漢字いがいの文字も、SVGがあれば使えます</div>
      <div class="sub-tab-container" id="subTabContainer">
        <button class="sub-tab-btn active" data-sub-type="basic">せいおん</button>
        <button class="sub-tab-btn" data-sub-type="dakuten">だくおん</button>
        <button class="sub-tab-btn" data-sub-type="handakuten">はんだくおん</button>
      </div>
      <div class="kana-grid" id="kanaGrid"></div>
      <div class="variant-row" id="variantRow"></div>
      <button class="modal-select-btn" id="modalSelectBtn">これにする</button>
    </div>
  </div>

  <!-- 結果表示ポップアップ -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="stamp-emoji" id="stampEmoji"></div>
      <div class="result-message" id="resultMessage"></div>
      <div class="result-detail" id="resultDetail"></div>
      <img id="resultThumb" style="max-width:120px; margin:10px auto; display:none; border:1px solid #ddd; border-radius:10px;" />
      <br>
      <button id="closeResultBtn">とじる</button>
    </div>
  </div>

  <!-- 履歴モーダル -->
  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 れんしゅうのきろく</h2>
        <button class="modal-close" id="historyCloseBtn">&times;</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <button class="clear-history-btn" id="clearHistoryBtn">ぜんぶけす</button>
    </div>
  </div>

  <div class="footer">made with ❤️</div>

  <script>
    (function() {
      const pathParts = window.location.pathname.split('/');
      const repoName = pathParts.length > 2 ? pathParts[1] : '';
      const BASE_PATH = repoName ? `/${repoName}` : '';

        "あ,3042","い,3044","う,3046","え,3048","お,304A",

      let cachedJaVoice = null;
      function refreshJaVoice() {
        if (!speechSynthesis) return;
        const voices = speechSynthesis.getVoices();
        if (voices && voices.length) {
          cachedJaVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja')) || null;
        }
      }
      if (speechSynthesis) {
        refreshJaVoice();
        speechSynthesis.addEventListener('voiceschanged', refreshJaVoice);
        // 最初のタップ／クリックで無音の発話を1回行い、以降の読み上げが確実に鳴るようにする（ブラウザの自動再生制限対策）
        const primeSpeech = () => {
          refreshJaVoice();
          try {
            const u = new SpeechSynthesisUtterance(' ');
            u.volume = 0; u.lang = 'ja-JP';
            speechSynthesis.speak(u);
          } catch {}
          document.removeEventListener('pointerdown', primeSpeech);
        };
        document.addEventListener('pointerdown', primeSpeech, { once: true });
      }

      function getCharacterTypeDescription(char) {
        const code = char.codePointAt(0);
        if (code >= 0x3040 && code <= 0x309F) return 'ひらがな';
        if (code >= 0x30A0 && code <= 0x30FF) return 'カタカナ';
        for (let g = 1; g <= 6; g++) {
          if (gradeKanji[g] && gradeKanji[g].includes(char)) return `小学${g}年の漢字`;
        }
        if (gradeKanji[7] && gradeKanji[7].includes(char)) return '常用漢字';
        return '';
      }

      function speakCharacterWithType(char) {
        if (!speechSynthesis) return;
        speechSynthesis.cancel();
        if (!cachedJaVoice) refreshJaVoice();
        const type = getCharacterTypeDescription(char);
        const phrase = type ? `${type}の、${char}` : char;
        const u = new SpeechSynthesisUtterance(phrase);
        u.lang = 'ja-JP'; u.rate = 0.8; u.pitch = 1.2; u.volume = 1;
        if (cachedJaVoice) u.voice = cachedJaVoice;
        speechSynthesis.speak(u);
      }

      function speakCharacter(char) {
        if (!speechSynthesis) return;
        speechSynthesis.cancel();
        if (!cachedJaVoice) refreshJaVoice();
        const u = new SpeechSynthesisUtterance(char);
        u.lang = 'ja-JP'; u.rate = 0.8; u.pitch = 1.2; u.volume = 1;
        if (cachedJaVoice) u.voice = cachedJaVoice;
        speechSynthesis.speak(u);
      }

              b.addEventListener('click', function() {
                document.querySelectorAll('.sub-tab-btn').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                currentSubType = this.dataset.subType;
                renderGrid();
              });
            });
          }
          renderGrid();
        });
      });

      function getGridData() {
        if (currentKanaType === 'kanji') {
          const kanjiList = gradeKanji[currentGrade] || [];
          const cols = 5;
          const rows = [];
          for (let i = 0; i < kanjiList.length; i += cols) {
            rows.push(kanjiList.slice(i, i + cols));
          }
          return rows;
        } else if (currentKanaType === 'hiragana') {
          if (currentSubType === 'basic') return hiraganaBasic;
          if (currentSubType === 'dakuten') return hiraganaDakuten;
          if (currentSubType === 'handakuten') return hiraganaHandakuten;
        } else if (currentKanaType === 'katakana') {
          if (currentSubType === 'basic') return katakanaBasic;
          if (currentSubType === 'dakuten') return katakanaDakuten;
          if (currentSubType === 'handakuten') return katakanaHandakuten;
        }
        return [];
      }

      function renderGrid() {
        searchResultsActive = false;
        kanaGrid.classList.remove('search-result-grid');
        const gridData = getGridData();
        kanaGrid.innerHTML = '';
        gridData.forEach(row => {
          row.forEach(item => {
            let char, code;
            if (Array.isArray(item)) {
              char = item[0];
              code = item[1];
            } else {
              char = item;
              code = getCodeForChar(char);
            }
            if (char === '' || char === undefined) {
              const emptyDiv = document.createElement('div');
              kanaGrid.appendChild(emptyDiv);
              return;
            }
            const btn = document.createElement('button');
            btn.className = 'kana-btn';
            btn.textContent = char;
            if (code) {
              btn.addEventListener('click', () => {
                document.querySelectorAll('.kana-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedModalChar = char;
                selectedModalCode = code;
                renderVariantRow(char, code);
              });
            }
            kanaGrid.appendChild(btn);
          });
        });
        if (selectedModalChar) {
          const buttons = kanaGrid.querySelectorAll('.kana-btn');
          buttons.forEach(btn => {
            if (btn.textContent === selectedModalChar) btn.classList.add('selected');
          });
        }
      }

      // 選んだ文字に字形バリエーションがあれば選択チップを表示する
      function renderVariantRow(char, mainCode) {
        const variants = getVariantsForCode(mainCode);
        if (!variants.length) { variantRow.classList.remove('show'); variantRow.innerHTML = ''; return; }
        variantRow.innerHTML = '';
        const label = document.createElement('span');
        label.className = 'variant-label';
        label.textContent = '字形:';
        variantRow.appendChild(label);
        const options = [{ code: baseCodeOf(mainCode), label: '標準' }]
          .concat(variants.map((v, i) => ({ code: v, label: `字形${i + 2}` })));
        options.forEach(opt => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'variant-chip' + (selectedModalCode === opt.code ? ' active' : '');
          chip.textContent = opt.label;
          chip.addEventListener('click', () => {
            selectedModalCode = opt.code;
            variantRow.querySelectorAll('.variant-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
          });
          variantRow.appendChild(chip);
        });
        variantRow.classList.add('show');
      }

      let searchResultsActive = false;
      function clearSearchResults() {
        if (!searchResultsActive) return;
        searchResultsActive = false;
        kanaGrid.classList.remove('search-result-grid');
        renderGrid();
      }
      // どの文字でも（常用漢字外・人名用漢字・旧字体なども）SVGファイルさえあれば選べるようにする検索。
      // KanjiVGのファイル名＝文字コードなので、事前の対応表なしにその場でコードを計算できる。
      function performCharSearch(query) {
        const chars = Array.from(new Set(Array.from(query).filter(c => c.trim() !== '')));
        if (!chars.length) { clearSearchResults(); return; }
        searchResultsActive = true;
        kanaGrid.classList.add('search-result-grid');
        kanaGrid.innerHTML = '';
        chars.forEach(char => {
          const code = getCodeForChar(char);
          const btn = document.createElement('button');
          btn.className = 'kana-btn';
          btn.textContent = char;
          btn.title = '確認中…';
          btn.addEventListener('click', () => {
            if (btn.classList.contains('no-svg')) return;
            document.querySelectorAll('.kana-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedModalChar = char;
            selectedModalCode = code;
            renderVariantRow(char, code);
          });
          kanaGrid.appendChild(btn);
          verifySvgAvailable(code).then(ok => {
            if (!ok) { btn.classList.add('no-svg'); btn.title = 'この文字の書き順データが見つかりませんでした'; }
            else btn.title = '';
          });
        });
      }
      async function verifySvgAvailable(code) {
        try {
          const paddedCode = code.toLowerCase().padStart(5, '0');
          const url = `${BASE_PATH}/svg/${paddedCode}.svg`;
          let res = await fetch(url, { method: 'HEAD' });
          if (!res.ok) res = await fetch(`./svg/${paddedCode}.svg`, { method: 'HEAD' });
          return res.ok;
        } catch { return false; }
      }
      if (charSearchInput) {
        let searchDebounce = null;
        charSearchInput.addEventListener('input', () => {
          clearTimeout(searchDebounce);
          searchDebounce = setTimeout(() => performCharSearch(charSearchInput.value), 150);
        });
      }

      modalSelectBtn.addEventListener('click', () => {
        if (selectedModalChar && selectedModalCode) {
          currentChar = selectedModalChar;
          currentUnicode = selectedModalCode;
          selectedCharDisplay.textContent = currentChar;
          closeModal();
          if (isSentenceMode) stopCustomStringMode();
          loadAndDisplay(currentUnicode);
        } else {
          alert('文字を選んでね！');
        }
      });

      openKanaTableBtn.addEventListener('click', openModal);

      function setQuizMode(mode) {
        quizMode = mode;
        modeBtns.forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
        if (mode === 'select') {
          charSelectArea.style.display = 'flex';
          nextCharBtn.style.display = 'none';
        } else {
          charSelectArea.style.display = 'none';
          if (isListeningMode) nextCharBtn.style.display = 'inline-block';
        }
      }

      function getNextSequentialChar() {
        const item = kanaMap[currentQuizIndex];
        currentQuizIndex = (currentQuizIndex + 1) % kanaMap.length;
        return item;
      }
      function getRandomChar() {
        const randomIndex = Math.floor(Math.random() * kanaMap.length);
        return kanaMap[randomIndex];
      }

      function loadQuizChar() {
        let item;
        if (quizMode === 'sequential') {
          item = getNextSequentialChar();
        } else if (quizMode === 'random') {
          item = getRandomChar();
        } else {
          return currentUnicode;
        }
        const [char, code] = item.split(',');
        currentChar = char;
        currentUnicode = code;
        if (quizMode !== 'select') selectedCharDisplay.textContent = currentChar;
        return code;
      }

      // ============ 文章れんしゅう（複数キャンバスモード） ============
      // startCustomStringMode/stopCustomStringMode は既存の入力欄・ボタンにそのまま紐づく。
      // 1つの文字を1つのキャンバスで順番に練習する代わりに、複数の文字を同時に画面へ並べて練習できる。
      function startCustomStringMode() {
        const raw = customStringInput.value.trim();
        if (!raw) return;
        if (practiceMode !== 'none') exitPracticeMode();
        if (isListeningMode) exitListeningMode();
        spChars = Array.from(raw).filter(c => c.trim() !== '');
        if (!spChars.length) return;
        spPage = 0;
        spCompletedCount = 0;
        isSentenceMode = true;
        startCustomStringBtn.style.display = 'none';
        stopCustomStringBtn.style.display = 'inline-block';
        appGrid.style.display = 'none';
        sentencePracticeArea.style.display = 'flex';
        renderSentencePage();
      }

      function stopCustomStringMode() {
        if (!isSentenceMode) return;
        isSentenceMode = false;
        spChars = [];
        spCards = [];
        spGrid.innerHTML = '';
        startCustomStringBtn.style.display = 'inline-block';
        stopCustomStringBtn.style.display = 'none';
        appGrid.style.display = '';
        sentencePracticeArea.style.display = 'none';
      }

      startCustomStringBtn.addEventListener('click', startCustomStringMode);
      stopCustomStringBtn.addEventListener('click', stopCustomStringMode);
      spStopBtn.addEventListener('click', stopCustomStringMode);

      // ---- ページサイズ：横長Chromebook想定は 4x2=8まい、縦長(スマホ)は 2x2=4まい ----
      // 1画面に出す枚数の目安：手書き練習に十分な大きさ（最低120px四方）を保ちつつ、
      // なぞり書きの精度チェックが破綻しない範囲として、横長で8・縦長で4を上限にしている。
      function isLandscapeWide() {
        return window.matchMedia('(orientation: landscape) and (min-width: 700px)').matches;
      }
      function getSpPageSize() { return isLandscapeWide() ? 8 : 4; }

      function renderSentencePage() {
        const pageSize = getSpPageSize();
        const totalPages = Math.max(1, Math.ceil(spChars.length / pageSize));
        if (spPage >= totalPages) spPage = totalPages - 1;
        if (spPage < 0) spPage = 0;
        const start = spPage * pageSize;
        const end = Math.min(start + pageSize, spChars.length);

        spGrid.innerHTML = '';
        spCards = [];
        for (let i = start; i < end; i++) {
          const state = createPracticeCard(spChars[i], i);
          spGrid.appendChild(state.element);
          spCards.push(state);
        }
        spPageLabel.textContent = `${spPage + 1} / ${totalPages}`;
        spPrevBtn.disabled = spPage <= 0;
        spNextBtn.disabled = spPage >= totalPages - 1;
        updateSpProgress();
      }
      function updateSpProgress() {
        spProgress.textContent = spCompletedCount >= spChars.length
          ? `🎉 ぜんぶできたね！（${spChars.length}字）`
          : `できた文字：${spCompletedCount} / ${spChars.length}字`;
      }
      spPrevBtn.addEventListener('click', () => { spPage--; renderSentencePage(); });
      spNextBtn.addEventListener('click', () => { spPage++; renderSentencePage(); });

      let spResizeTimer = null;
      window.addEventListener('resize', () => {
        if (!isSentenceMode) return;
        clearTimeout(spResizeTimer);
        spResizeTimer = setTimeout(() => {
          // ページサイズが変わる可能性があるので、現在の先頭文字位置を保ったまま再計算する
          const pageSize = getSpPageSize();
          const firstIndexShown = spPage * (spCards.length || pageSize);
          spPage = Math.floor(firstIndexShown / pageSize);
          renderSentencePage();
        }, 200);
      });

      // ---- 1文字ぶんの練習カード ----
      function createPracticeCard(char, globalIndex) {
        const code = getCodeForChar(char);
        const el = document.createElement('div');
        el.className = 'sp-card';

        const idxLabel = document.createElement('span');
        idxLabel.className = 'sp-card-index';
        idxLabel.textContent = String(globalIndex + 1);
        el.appendChild(idxLabel);

        const display = document.createElement('div');
        display.className = 'sp-card-display';
        display.textContent = '…';
        el.appendChild(display);

        const progress = document.createElement('div');
        progress.className = 'sp-card-progress';
        el.appendChild(progress);

        const btnRow = document.createElement('div');
        btnRow.className = 'sp-card-btns';
        const sampleBtn = document.createElement('button'); sampleBtn.type = 'button'; sampleBtn.textContent = '👀見本';
        const soundBtn = document.createElement('button'); soundBtn.type = 'button'; soundBtn.textContent = '🔊';
        const resetBtn = document.createElement('button'); resetBtn.type = 'button'; resetBtn.textContent = '🔄';
        btnRow.appendChild(sampleBtn); btnRow.appendChild(soundBtn); btnRow.appendChild(resetBtn);
        el.appendChild(btnRow);

        const state = {
          char, code, element: el, display, progress, sampleBtn,
          strokePaths: [], strokeSamplePoints: [],
          expectedStrokeIndex: 0, savedStrokes: [], ratings: [],
          canvas: null, ctx: null, completed: false, hasSvg: false,
          isDrawing: false, userDrawnPoints: [], isFlashing: false, isSampling: false
        };

        soundBtn.addEventListener('click', () => speakCharacterWithType(char));
        resetBtn.addEventListener('click', () => resetCard(state));
        sampleBtn.addEventListener('click', () => playCardSample(state));

        initCard(state);
        return state;
      }

      async function initCard(state) {
        const svgDoc = await loadSvg(state.code);
        const svgRoot = svgDoc ? svgDoc.querySelector('svg') : null;
        if (!svgDoc || !svgRoot) {
          state.element.classList.add('nosvg');
          state.display.innerHTML = '<div class="sp-card-nosvg-msg">✕<br>データなし</div>';
          state.sampleBtn.disabled = true;
          return;
        }
        state.hasSvg = true;
        svgRoot.removeAttribute('width'); svgRoot.removeAttribute('height');
        svgRoot.style.display = 'block'; svgRoot.style.pointerEvents = 'none';
        svgRoot.querySelectorAll('path').forEach(p => {
          p.style.display = 'block'; p.style.fill = 'none';
          p.style.strokeLinecap = 'round'; p.style.strokeLinejoin = 'round';
          p.style.stroke = '#d9d0bd'; p.style.strokeWidth = '9'; p.style.transition = 'none';
        });
        svgRoot.querySelectorAll('text').forEach(t => t.style.display = 'none');

        const paths = extractStrokes(svgDoc);
        state.strokePaths = paths;
        state.strokeSamplePoints = paths.map(p => samplePath(p, 5));

        state.display.innerHTML = '';
        state.display.appendChild(svgRoot);

        const canvas = document.createElement('canvas');
        canvas.className = 'sp-card-canvas';
        state.display.appendChild(canvas);
        state.canvas = canvas; state.ctx = canvas.getContext('2d');
        const vb = parseViewBox(svgRoot);
        canvas.width = vb.w; canvas.height = vb.h;
        state.ctx.lineWidth = 6; state.ctx.strokeStyle = '#333';
        state.ctx.lineCap = 'round'; state.ctx.lineJoin = 'round';

        attachCardDrawEvents(state);
        updateCardProgress(state);
      }

      function cardCanvasCoords(state, e) {
        const rect = state.canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (state.canvas.width / rect.width),
          y: (e.clientY - rect.top) * (state.canvas.height / rect.height)
        };
      }
      function attachCardDrawEvents(state) {
        state.canvas.addEventListener('pointerdown', (e) => {
          if (state.completed || state.isFlashing || state.isSampling) return;
          const { x, y } = cardCanvasCoords(state, e);
          state.isDrawing = true; state.userDrawnPoints = [{ x, y }];
          state.ctx.beginPath(); state.ctx.moveTo(x, y);
          e.preventDefault();
        });
        state.canvas.addEventListener('pointermove', (e) => {
          if (!state.isDrawing || state.isFlashing) return;
          const { x, y } = cardCanvasCoords(state, e);
          state.userDrawnPoints.push({ x, y });
          state.ctx.lineTo(x, y); state.ctx.stroke(); state.ctx.beginPath(); state.ctx.moveTo(x, y);
          e.preventDefault();
        });
        const up = () => {
          if (!state.isDrawing || state.isFlashing) return;
          state.isDrawing = false; state.ctx.beginPath();
          handleCardStrokeEnd(state);
        };
        state.canvas.addEventListener('pointerup', up);
        state.canvas.addEventListener('pointerleave', up);
      }

      function redrawCard(state) {
        state.ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);
        state.ctx.strokeStyle = '#333'; state.ctx.lineWidth = 6;
        for (const pts of state.savedStrokes) {
          state.ctx.beginPath(); state.ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) state.ctx.lineTo(pts[i].x, pts[i].y);
          state.ctx.stroke();
        }
      }
      function flashCardWrongStroke(state, points) {
        state.isFlashing = true; state.canvas.style.pointerEvents = 'none';
        state.ctx.strokeStyle = '#e74c3c'; state.ctx.lineWidth = 8;
        state.ctx.beginPath(); state.ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) state.ctx.lineTo(points[i].x, points[i].y);
        state.ctx.stroke();
        setTimeout(() => {
          redrawCard(state); state.ctx.strokeStyle = '#333'; state.ctx.lineWidth = 6;
          state.isFlashing = false; state.canvas.style.pointerEvents = 'auto';
        }, 450);
      }
      function updateCardProgress(state) {
        if (!state.hasSvg) return;
        state.progress.textContent = `${state.expectedStrokeIndex} / ${state.strokePaths.length} 画`;
      }
      function handleCardStrokeEnd(state) {
        const pts = state.userDrawnPoints;
        if (pts.length < 3) { redrawCard(state); state.userDrawnPoints = []; return; }
        const expected = state.expectedStrokeIndex;
        const samplePts = state.strokeSamplePoints[expected];
        const drawnLength = calcDrawnLength(pts);
        const startAvg = checkStartPosition(pts, samplePts, START_DISTANCE_THRESHOLD);
        if (startAvg > START_DISTANCE_THRESHOLD) { flashCardWrongStroke(state, pts); state.userDrawnPoints = []; return; }
        const pathLength = state.strokePaths[expected].getTotalLength();
        if (drawnLength < pathLength * LENGTH_RATIO_MIN) { flashCardWrongStroke(state, pts); state.userDrawnPoints = []; return; }
        const avgDist = averageDistance(pts, samplePts);
        const coverage = calcCoverage(pts, samplePts, 15);
        let rating = 'poor';
        if (avgDist <= DISTANCE_THRESHOLD_GOOD && coverage >= COVERAGE_THRESHOLD_GOOD) rating = 'good';
        else if (avgDist <= DISTANCE_THRESHOLD_OK && coverage >= COVERAGE_THRESHOLD_OK) rating = 'ok';
        else { flashCardWrongStroke(state, pts); state.userDrawnPoints = []; return; }
        state.savedStrokes.push([...pts]); state.ratings.push(rating); state.expectedStrokeIndex++;
        state.userDrawnPoints = [];
        updateCardProgress(state);
        if (state.expectedStrokeIndex >= state.strokePaths.length) completeCard(state);
      }
      function completeCard(state) {
        state.completed = true;
        state.element.classList.add('completed');
        const goodCount = state.ratings.filter(r => r === 'good').length;
        const total = state.strokePaths.length;
        let stamp = '💪';
        if (goodCount === total) stamp = '🌟'; else if (goodCount >= total * 0.7) stamp = '👍'; else if (goodCount >= 1) stamp = '😊';
        const stampEl = document.createElement('div');
        stampEl.className = 'sp-card-stamp';
        stampEl.textContent = stamp;
        state.element.appendChild(stampEl);
        const thumbData = state.canvas.toDataURL('image/png');
        saveHistory({ char: state.char, date: new Date().toLocaleString(), mode: 'sentence', rating: goodCount, total, stamp, thumb: thumbData });
        spCompletedCount++;
        updateSpProgress();
      }
      function resetCard(state) {
        if (!state.hasSvg) return;
        state.expectedStrokeIndex = 0; state.savedStrokes = []; state.ratings = [];
        state.completed = false; state.element.classList.remove('completed');
        const stampEl = state.element.querySelector('.sp-card-stamp');
        if (stampEl) stampEl.remove();
        state.ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);
        updateCardProgress(state);
      }
      async function playCardSample(state) {
        if (!state.hasSvg || state.isSampling) return;
        state.isSampling = true;
        state.sampleBtn.disabled = true;
        const originalDash = state.strokePaths.map(p => p.style.strokeDasharray);
        for (const p of state.strokePaths) { p.style.display = 'none'; p.style.transition = 'none'; p.style.strokeDasharray = 'none'; }
        for (const p of state.strokePaths) {
          const duration = Math.max(250, (p.getTotalLength() / BASE_LENGTH) * 500);
          await animateSingleStroke(p, duration);
        }
        setTimeout(() => {
          state.strokePaths.forEach(p => { p.style.display = 'block'; p.style.stroke = '#d9d0bd'; });
          state.isSampling = false; state.sampleBtn.disabled = false;
        }, 400);
      }

      function enterPracticeMode(mode) {
        if (!strokePaths.length) return;
        calculateAllSamplePoints();
        practiceMode = mode;
        expectedStrokeIndex = 0;
        userDrawnPoints = [];
        savedStrokes = [];
        strokeRatings = [];
        if (mode === 'check') lockStrokeNumbers(true);
        else lockStrokeNumbers(false);
        strokePaths.forEach(p => {
          p.style.display = 'block';
          p.style.stroke = '#d0d0d0';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        if (mode === 'hint') {
          updateHighlight();
          setFeedback('🔵 あおい線をなぞってね');
        } else if (mode === 'check') {
          setFeedback('🔍 じぶんで書き順を考えてね（番号はかくされています）');
        }
        canvas.style.display = 'block';
        retryTracingBtn.style.display = 'inline-block';
        setupCanvas();
        isAnimating = false;
        updateUI();
        attachDrawEvents();
      }
      function exitPracticeMode() {
        lockStrokeNumbers(false);
        canvas.style.display = 'none';
        retryTracingBtn.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        applyStrokeColors(strokePaths);
        practiceMode = 'none';
        currentStrokeIndex = -1;
        isAnimating = false;
        updateUI();
        removeDrawEvents();
        clearFeedback();
      }
      function updateHighlight() {
        if (practiceMode !== 'hint') return;
        strokePaths.forEach((p, idx) => {
          if (idx === expectedStrokeIndex) {
            p.style.stroke = '#4a90d9';
            p.style.strokeWidth = '10';
            p.parentNode.appendChild(p);
          } else {
            p.style.stroke = '#d0d0d0';
            p.style.strokeWidth = '9';
          }
        });
      }
      function setFeedback(msg, isGood = true) {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = msg;
        feedbackText.style.color = isGood ? '#2a7d2a' : '#c0392b';
      }
      function clearFeedback() {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = '';
      }

      async function loadSvg(unicode) {
        try {
          const paddedCode = unicode.toLowerCase().padStart(5, '0');
          const svgUrl = `${BASE_PATH}/svg/${paddedCode}.svg`;
          let response = await fetch(svgUrl);
          if (!response.ok) {
            const altUrl = `./svg/${paddedCode}.svg`;
            response = await fetch(altUrl);
          }
          if (!response.ok) throw new Error(`SVG load failed (status: ${response.status})`);
          const svgText = await response.text();
          const parser = new DOMParser();
          return parser.parseFromString(svgText, 'image/svg+xml');
        } catch (err) {
          console.error('SVG load error:', err);
          return null;
        }
      }
      function extractStrokes(svgDoc) {
        const paths = [];
        const allG = svgDoc.querySelectorAll('g');
        let strokePathsG = null;
        allG.forEach(g => {
          if ((g.getAttribute('id') || '').includes('StrokePaths')) strokePathsG = g;
        });
        if (strokePathsG) {
          const innerG = strokePathsG.querySelector('g');
          if (innerG) {
            innerG.querySelectorAll('path').forEach(p => {
              if (p.getAttribute('d')) paths.push(p);
            });
          }
        }
        if (paths.length === 0) {
          const pathElements = svgDoc.querySelectorAll('path');
          const temp = [];
          pathElements.forEach(p => {
            const m = (p.getAttribute('id') || '').match(/-s(\d+)$/);
            if (m && p.getAttribute('d')) temp.push({ path: p, num: parseInt(m[1]) });
          });
          temp.sort((a, b) => a.num - b.num);
          temp.forEach(item => paths.push(item.path));
        }
        return paths;
      }
      function samplePath(path, step = 5) {
        const points = [];
        const length = path.getTotalLength();
        if (length === 0) return points;
        let dist = 0;
        while (dist <= length) {
          const pt = path.getPointAtLength(dist);
          points.push({ x: pt.x, y: pt.y });
          dist += step;
        }
        const endPt = path.getPointAtLength(length);
        if (points.length === 0 || points[points.length-1].x !== endPt.x || points[points.length-1].y !== endPt.y) {
          points.push({ x: endPt.x, y: endPt.y });
        }
        return points;
      }
      function calculateAllSamplePoints() { strokeSamplePoints = strokePaths.map(path => samplePath(path, 5)); }
      function minDistanceToPath(point, samplePoints) {
        let min = Infinity;
        for (const sp of samplePoints) {
          const dx = point.x - sp.x, dy = point.y - sp.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if (dist < min) min = dist;
        }
        return min;
      }
      function averageDistance(drawnPoints, samplePoints) {
        if (drawnPoints.length === 0) return Infinity;
        const total = drawnPoints.reduce((sum, p) => sum + minDistanceToPath(p, samplePoints), 0);
        return total / drawnPoints.length;
      }
      function calcCoverage(drawnPoints, samplePoints, threshold = 15) {
        if (drawnPoints.length === 0 || samplePoints.length === 0) return 0;
        let covered = 0;
        for (const sp of samplePoints) {
          if (minDistanceToPath(sp, drawnPoints) <= threshold) covered++;
        }
        return covered / samplePoints.length;
      }
      function calcDrawnLength(points) {
        let len = 0;
        for (let i = 1; i < points.length; i++) {
          const dx = points[i].x - points[i-1].x, dy = points[i].y - points[i-1].y;
          len += Math.sqrt(dx*dx+dy*dy);
        }
        return len;
      }
      function checkStartPosition(drawnPoints, samplePoints, threshold) {
        const checkCount = Math.min(5, drawnPoints.length);
        if (checkCount === 0) return Infinity;
        let total = 0;
        for (let i = 0; i < checkCount; i++) total += minDistanceToPath(drawnPoints[i], samplePoints);
        return total / checkCount;
      }
      function findClosestStroke(drawnPoints) {
        let bestIdx = -1, bestScore = Infinity;
        for (let i = 0; i < strokeSamplePoints.length; i++) {
          const avg = averageDistance(drawnPoints, strokeSamplePoints[i]);
          if (avg > MATCH_DISTANCE_THRESHOLD) continue;
          const cov = calcCoverage(drawnPoints, strokeSamplePoints[i], 15);
          const score = avg - cov * 15;
          if (score < bestScore) { bestScore = score; bestIdx = i; }
        }
        return bestIdx;
      }
      function parseViewBox(svgRoot) {
        const vb = svgRoot.getAttribute('viewBox');
        if (vb) {
          const parts = vb.trim().split(/\s+/).map(Number);
          if (parts.length === 4 && parts.every(n => !isNaN(n))) return { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
        }
        return { x: 0, y: 0, w: 109, h: 109 };
      }
      function addCrosshairGuide(svgRoot) {
        const ns = 'http://www.w3.org/2000/svg';
        const vb = parseViewBox(svgRoot);
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('id', 'crosshairGuide');
        const vLine = document.createElementNS(ns, 'line');
        vLine.setAttribute('x1', vb.x + vb.w/2); vLine.setAttribute('y1', vb.y);
        vLine.setAttribute('x2', vb.x + vb.w/2); vLine.setAttribute('y2', vb.y + vb.h);
        const hLine = document.createElementNS(ns, 'line');
        hLine.setAttribute('x1', vb.x); hLine.setAttribute('y1', vb.y + vb.h/2);
        hLine.setAttribute('x2', vb.x + vb.w); hLine.setAttribute('y2', vb.y + vb.h/2);
        [vLine, hLine].forEach(line => {
          line.setAttribute('stroke', '#7ec8e3');
          line.setAttribute('stroke-width', Math.max(0.5, vb.w * 0.006));
          line.setAttribute('stroke-dasharray', `${vb.w * 0.02},${vb.w * 0.015}`);
          g.appendChild(line);
        });
        svgRoot.insertBefore(g, svgRoot.firstChild);
      }
      function strokeStartLabelPos(path, offsetDist) {
        const total = path.getTotalLength();
        if (total === 0) return { x:0, y:0 };
        const p0 = path.getPointAtLength(0), p1 = path.getPointAtLength(Math.min(total,6));
        let dx = p1.x - p0.x, dy = p1.y - p0.y;
        const len = Math.sqrt(dx*dx+dy*dy) || 1;
        dx /= len; dy /= len;
        return { x: p0.x - dy*offsetDist*0.7 - dx*offsetDist*0.6, y: p0.y + dx*offsetDist*0.7 - dy*offsetDist*0.6 };
      }
      function addStrokeNumbers(svgRoot, paths) {
        const ns = 'http://www.w3.org/2000/svg';
        const vb = parseViewBox(svgRoot);
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('id', 'strokeNumbersGroup');
        const fontSize = vb.w * 0.11, offsetDist = vb.w * 0.075;
        paths.forEach((path, idx) => {
          const pos = strokeStartLabelPos(path, offsetDist);
          const text = document.createElementNS(ns, 'text');
          text.textContent = String(idx+1);
          text.setAttribute('x', pos.x); text.setAttribute('y', pos.y);
          text.setAttribute('font-size', fontSize); text.setAttribute('font-weight','bold');
          text.setAttribute('fill', getStrokeNumberColor(idx));
          text.setAttribute('text-anchor','middle'); text.setAttribute('dominant-baseline','central');
          text.style.paintOrder = 'stroke'; text.style.stroke = '#fff'; text.style.strokeWidth = String(fontSize*0.18);
          g.appendChild(text);
        });
        svgRoot.appendChild(g);
        g.style.display = (strokeNumbersLocked || !showStrokeNumbers) ? 'none' : '';
      }
      function applyStrokeColors(paths) { paths.forEach((p,idx) => { p.style.stroke = getStrokeLineColor(idx); }); }
      function displaySvg(svgDoc) {
        svgContainer.innerHTML = '';
        const p = document.createElement('p'); p.style.cssText='color:#ccc;'; p.id='placeholderText';
        p.textContent = characterHidden ? '？' : '';
        svgContainer.appendChild(p);
        if (!svgDoc) { p.textContent = 'SVGが見つかりませんでした'; return null; }
        const svgRoot = svgDoc.querySelector('svg');
        if (!svgRoot) { p.textContent = '無効なSVGです'; return null; }
        svgRoot.setAttribute('width','200'); svgRoot.setAttribute('height','200');
        svgRoot.style.display='block'; svgRoot.style.margin='auto'; svgRoot.style.pointerEvents='none';
        svgRoot.querySelectorAll('path').forEach(path => {
          path.style.display='none'; path.style.strokeWidth='9';
          path.style.strokeLinecap='round'; path.style.strokeLinejoin='round'; path.style.fill='none'; path.style.transition='none';
        });
        svgRoot.querySelectorAll('text').forEach(t => t.style.display='none');
        addCrosshairGuide(svgRoot);
        applyStrokeColors(strokePaths);
        addStrokeNumbers(svgRoot, strokePaths);
        svgContainer.appendChild(svgRoot);
        const newCanvas = document.createElement('canvas'); newCanvas.id='drawCanvas'; newCanvas.style.display='none';
        svgContainer.appendChild(newCanvas);
        canvas = newCanvas; ctx = canvas.getContext('2d');
        setupCanvas();
        if (characterHidden) svgContainer.classList.add('hidden-char');
        return svgRoot;
      }
      function setupCanvas() {
        if (!canvas) return;
        const svg = svgContainer.querySelector('svg'); if (!svg) return;
        const viewBox = svg.getAttribute('viewBox');
        if (viewBox) { const parts = viewBox.split(/\s+/); canvas.width = parseFloat(parts[2]); canvas.height = parseFloat(parts[3]); }
        else { canvas.width = 200; canvas.height = 200; }
        ctx.lineWidth = 6; ctx.strokeStyle = '#333'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      }

      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX-rect.left)*(canvas.width/rect.width), y: (e.clientY-rect.top)*(canvas.height/rect.height) };
      }
      function onPointerDown(e) {
        if (practiceMode==='none'||isFlashing) return;
        const {x,y}=getCanvasCoords(e); isDrawing=true; userDrawnPoints=[{x,y}]; ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault();
      }
      function onPointerMove(e) {
        if (!isDrawing||practiceMode==='none'||isFlashing) return;
        const {x,y}=getCanvasCoords(e); userDrawnPoints.push({x,y}); ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault();
      }
      function onPointerUp(e) {
        if (!isDrawing||practiceMode==='none'||isFlashing) return;
        isDrawing=false; ctx.beginPath();
        if (userDrawnPoints.length<3) { setFeedback('✍️ もっと長くなぞってね',false); redrawCanvas(); userDrawnPoints=[]; return; }
        const drawnLength=calcDrawnLength(userDrawnPoints); let rating='poor';
        if (practiceMode==='hint'||practiceMode==='listen') {
          const startAvg=checkStartPosition(userDrawnPoints,strokeSamplePoints[expectedStrokeIndex],START_DISTANCE_THRESHOLD);
          if (startAvg>START_DISTANCE_THRESHOLD) { setFeedback('❌ 書き順がちがうよ！',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          const pathLength=strokePaths[expectedStrokeIndex].getTotalLength();
          if (drawnLength<pathLength*LENGTH_RATIO_MIN) { setFeedback('✍️ もっと長くなぞってね',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          const avgDist=averageDistance(userDrawnPoints,strokeSamplePoints[expectedStrokeIndex]);
          const coverage=calcCoverage(userDrawnPoints,strokeSamplePoints[expectedStrokeIndex],15);
          if (avgDist<=DISTANCE_THRESHOLD_GOOD&&coverage>=COVERAGE_THRESHOLD_GOOD) { rating='good'; setFeedback('🌟 じょうず！'); }
          else if (avgDist<=DISTANCE_THRESHOLD_OK&&coverage>=COVERAGE_THRESHOLD_OK) { rating='ok'; setFeedback('👍 まあまあ！'); }
          else { setFeedback('💧 もうすこし！もういちど書いてね',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          savedStrokes.push([...userDrawnPoints]); strokeRatings.push(rating); expectedStrokeIndex++;
          if (expectedStrokeIndex>=strokePaths.length) finishCharacter(); else updateHighlight();
        } else if (practiceMode==='check') {
          const closestIdx=findClosestStroke(userDrawnPoints);
          if (closestIdx!==expectedStrokeIndex) { setFeedback('❌ 書き順がちがうよ！',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          const pathLength=strokePaths[expectedStrokeIndex].getTotalLength();
          if (drawnLength<pathLength*LENGTH_RATIO_MIN) { setFeedback('✍️ もっと長くなぞってね',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          const avgDist=averageDistance(userDrawnPoints,strokeSamplePoints[expectedStrokeIndex]);
          const coverage=calcCoverage(userDrawnPoints,strokeSamplePoints[expectedStrokeIndex],15);
          if (avgDist<=DISTANCE_THRESHOLD_GOOD&&coverage>=COVERAGE_THRESHOLD_GOOD) { rating='good'; setFeedback('🌟 じょうず！'); }
          else if (avgDist<=DISTANCE_THRESHOLD_OK&&coverage>=COVERAGE_THRESHOLD_OK) { rating='ok'; setFeedback('👍 まあまあ！'); }
          else { setFeedback('💧 もうすこし！もういちど書いてね',false); flashAndRemoveWrongStroke(userDrawnPoints); userDrawnPoints=[]; return; }
          savedStrokes.push([...userDrawnPoints]); strokeRatings.push(rating); expectedStrokeIndex++;
          if (expectedStrokeIndex>=strokePaths.length) finishCharacter();
        }
        userDrawnPoints=[];
      }
      function redrawCanvas() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.strokeStyle='#333'; ctx.lineWidth=6;
        for (const path of savedStrokes) { ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y); for(let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y); ctx.stroke(); }
      }
      function flashAndRemoveWrongStroke(points) {
        isFlashing=true; canvas.style.pointerEvents='none'; ctx.strokeStyle='#e74c3c'; ctx.lineWidth=8;
        ctx.beginPath(); ctx.moveTo(points[0].x,points[0].y); for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x,points[i].y); ctx.stroke();
        setTimeout(()=>{ redrawCanvas(); ctx.strokeStyle='#333'; ctx.lineWidth=6; isFlashing=false; canvas.style.pointerEvents='auto'; },500);
      }
      function attachDrawEvents() {
        canvas.addEventListener('pointerdown',onPointerDown); canvas.addEventListener('pointermove',onPointerMove);
        canvas.addEventListener('pointerup',onPointerUp); canvas.addEventListener('pointerleave',onPointerUp);
      }
      function removeDrawEvents() {
        canvas.removeEventListener('pointerdown',onPointerDown); canvas.removeEventListener('pointermove',onPointerMove);
        canvas.removeEventListener('pointerup',onPointerUp); canvas.removeEventListener('pointerleave',onPointerUp);
      }

      function animateSingleStroke(path,duration) {
        return new Promise(resolve => {
          const length=path.getTotalLength(); if(length===0){path.style.display='block';resolve();return;}
          path.style.display='block'; path.style.strokeDasharray=length; path.style.strokeDashoffset=length;
          path.style.transition=`stroke-dashoffset ${duration}ms ease-in-out`; path.getBoundingClientRect(); path.style.strokeDashoffset='0';
          const onEnd=()=>{ path.removeEventListener('transitionend',onEnd); path.style.transition='none'; path.style.strokeDasharray='none'; path.style.strokeDashoffset='0'; resolve(); };
          path.addEventListener('transitionend',onEnd);
          setTimeout(()=>{ if(path.style.strokeDasharray!=='none'){ path.style.transition='none'; path.style.strokeDasharray='none'; path.style.strokeDashoffset='0'; resolve(); } },duration+100);
        });
      }
      function resetAllStrokes() { strokePaths.forEach(p=>{ p.style.display='none'; p.style.transition='none'; p.style.strokeDasharray='none'; p.style.strokeDashoffset='0'; }); }
      async function animateToStroke(targetIndex) {
        if(!strokePaths.length||isAnimating||practiceMode!=='none')return;
        targetIndex=Math.min(Math.max(targetIndex,0),strokePaths.length-1);
        if(targetIndex<=currentStrokeIndex||currentStrokeIndex===-1){resetAllStrokes();currentStrokeIndex=-1;}
        isAnimating=true;updateUI();
        for(let i=Math.max(0,currentStrokeIndex+1);i<=targetIndex;i++){const pathLength=strokePaths[i].getTotalLength();let duration=(pathLength/BASE_LENGTH)*speedBaseDurations[animationSpeed];if(duration<MIN_DURATION)duration=MIN_DURATION;await animateSingleStroke(strokePaths[i],duration);currentStrokeIndex=i;updateUI();}
        isAnimating=false;updateUI();
      }
      function updateUI() {
        if(!strokePaths.length){infoText.textContent='ストロークが見つかりません';return;}
        if(practiceMode!=='none'){const displayIndex=Math.min(expectedStrokeIndex+1,strokePaths.length);let label='なぞり中';if(practiceMode==='listen')label='おとをきいてかく';else if(practiceMode==='check')label='書き順チェック';infoText.textContent=`✏️ ${label}：${displayIndex} / ${strokePaths.length} 画め`;strokeInfo.textContent=`全 ${strokePaths.length} 画`;nextBtn.style.display='none';speedControl.style.display='none';retryTracingBtn.style.display='inline-block';}
        else{const cur=currentStrokeIndex+1;infoText.textContent=`✏️ ${cur} / ${strokePaths.length} 画`;strokeInfo.textContent=`全 ${strokePaths.length} 画`;nextBtn.style.display='inline-block';nextBtn.disabled=isAnimating;speedControl.style.display='block';retryTracingBtn.style.display='none';}
      }

      async function loadSvgAndPrepare(unicode) {
        const svgDoc=await loadSvg(unicode); currentSvgDoc=svgDoc; if(!svgDoc)return;
        strokePaths=extractStrokes(svgDoc); displaySvg(svgDoc); if(characterHidden)svgContainer.classList.add('hidden-char');
      }
      function startListeningMode() {
        calculateAllSamplePoints(); practiceMode='listen'; isListeningMode=true; expectedStrokeIndex=0; userDrawnPoints=[]; savedStrokes=[]; strokeRatings=[];
        lockStrokeNumbers(false); strokePaths.forEach(p=>{p.style.display='block';p.style.stroke='#d0d0d0';p.style.strokeWidth='9';p.style.transition='none';p.style.strokeDasharray='none';p.style.strokeDashoffset='0';});
        hideCharacter(); speakCharacterWithType(currentChar); canvas.style.display='block'; retryTracingBtn.style.display='inline-block';
        if(quizMode!=='select') nextCharBtn.style.display='inline-block';
        setupCanvas(); isAnimating=false; updateUI(); attachDrawEvents(); setFeedback('🔊 おとをきいて、かいてね');
      }
      function exitListeningMode() {
        isListeningMode=false; characterHidden=false; svgContainer.classList.remove('hidden-char');
        revealCharBtn.style.display='none'; replaySoundBtn.style.display='none'; nextCharBtn.style.display='none';
        lockStrokeNumbers(false); canvas.style.display='none'; retryTracingBtn.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height);
        strokePaths.forEach(p=>{p.style.display='none';}); applyStrokeColors(strokePaths); practiceMode='none'; currentStrokeIndex=-1; isAnimating=false;
        updateUI(); removeDrawEvents(); clearFeedback();
      }

      function finishCharacter() {
        const goodCount=strokeRatings.filter(r=>r==='good').length; const total=strokePaths.length;
        let stamp='',message='';
        if(goodCount===total){stamp='🌟';message='パーフェクト！';}else if(goodCount>=total*0.7){stamp='👍';message='よくできました！';}else if(goodCount>=1){stamp='😊';message='がんばったね！';}else{stamp='💪';message='もうすこし！';}
        stampEmoji.textContent=stamp; resultMessage.textContent=message; resultDetail.textContent=`${currentChar}（${total}画中 ${goodCount}画 じょうず）`;
        const thumbData=canvas.toDataURL('image/png'); resultThumb.src=thumbData; resultThumb.style.display='inline-block'; resultOverlay.style.display='flex';
        saveHistory({char:currentChar,date:new Date().toLocaleString(),mode:practiceMode,rating:goodCount,total,stamp,thumb:thumbData});
        exitPracticeMode();
      }

      closeResultBtn.addEventListener('click',()=>{resultOverlay.style.display='none';});

      const HISTORY_KEY='kakijun_history';
      function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch{return[];}}
      function saveHistory(record){let history=getHistory();history.unshift(record);if(history.length>50)history=history.slice(0,50);localStorage.setItem(HISTORY_KEY,JSON.stringify(history));}
      function clearHistory(){localStorage.removeItem(HISTORY_KEY);renderHistory();}
      function renderHistory(){
        const history=getHistory(); historyList.innerHTML=history.length===0?'<p>きろくはまだないよ</p>':'';
        history.forEach(item=>{const div=document.createElement('div');div.className='history-item';div.innerHTML=`<span class="history-char">${item.char}</span><span class="history-stamp">${item.stamp}</span><span style="font-size:0.8rem;color:#888;">${item.date}</span>`;if(item.thumb){const img=document.createElement('img');img.className='history-thumb';img.src=item.thumb;div.prepend(img);}historyList.appendChild(div);});
      }

      historyBtn.addEventListener('click',()=>{renderHistory();historyModal.style.display='flex';});
      historyCloseBtn.addEventListener('click',()=>historyModal.style.display='none');
      window.addEventListener('click',(e)=>{if(e.target===historyModal)historyModal.style.display='none';});
      clearHistoryBtn.addEventListener('click',clearHistory);

      modeBtns.forEach(btn=>{btn.addEventListener('click',function(){const mode=this.dataset.mode;setQuizMode(mode);if(practiceMode==='listen')exitListeningMode();else if(practiceMode!=='none')exitPracticeMode();if(mode!=='select'){loadQuizChar();loadAndDisplay(currentUnicode);}});});
      showBtn.addEventListener('click',()=>{if(currentUnicode)loadAndDisplay(currentUnicode);});
      nextBtn.addEventListener('click',()=>{if(practiceMode!=='none'||isAnimating)return;if(currentStrokeIndex>=strokePaths.length-1)animateToStroke(0);else animateToStroke(currentStrokeIndex+1);});
      traceHintBtn.addEventListener('click',()=>{if(practiceMode==='listen'){exitListeningMode();enterPracticeMode('hint');}else if(practiceMode==='hint')exitPracticeMode();else if(practiceMode==='check'){exitPracticeMode();enterPracticeMode('hint');}else enterPracticeMode('hint');});
      traceCheckBtn.addEventListener('click',()=>{if(practiceMode==='listen'){exitListeningMode();enterPracticeMode('check');}else if(practiceMode==='check')exitPracticeMode();else if(practiceMode==='hint'){exitPracticeMode();enterPracticeMode('check');}else enterPracticeMode('check');});
      listenTraceBtn.addEventListener('click',()=>{if(practiceMode==='listen')exitListeningMode();else{if(practiceMode!=='none')exitPracticeMode();enterListeningMode();}});
      revealCharBtn.addEventListener('click',revealCharacter);
      nextCharBtn.addEventListener('click',async()=>{
        if(practiceMode==='listen'){
          ctx.clearRect(0,0,canvas.width,canvas.height); savedStrokes=[]; expectedStrokeIndex=0; userDrawnPoints=[]; strokeRatings=[];
          updateHighlight();updateUI(); const code=loadQuizChar(); if(code){await loadSvgAndPrepare(code);startListeningMode();} else stopCustomStringMode();
        }else{
          const code=loadQuizChar(); if(code)loadAndDisplay(code); else stopCustomStringMode();
        }
      });
      retryTracingBtn.addEventListener('click',()=>{
        if(practiceMode==='none')return; ctx.clearRect(0,0,canvas.width,canvas.height); savedStrokes=[]; expectedStrokeIndex=0; userDrawnPoints=[]; strokeRatings=[];
        updateHighlight();updateUI(); if(practiceMode==='listen'){setFeedback('🔊 もういちど、おとをきいてかいてね');speakCharacterWithType(currentChar);}
      });
      replaySoundBtn.addEventListener('click',replaySound);
      showNumbersCheckbox.addEventListener('change',()=>{if(strokeNumbersLocked)return;showStrokeNumbers=showNumbersCheckbox.checked;updateStrokeNumbersVisibility();});
      document.addEventListener('keydown',(e)=>{if(practiceMode!=='none'||isAnimating||isFlashing)return;if(e.key==='ArrowRight'){e.preventDefault();if(currentStrokeIndex>=strokePaths.length-1)animateToStroke(0);else animateToStroke(currentStrokeIndex+1);}else if(e.key==='ArrowLeft'){e.preventDefault();if(currentStrokeIndex>0)animateToStroke(currentStrokeIndex-1);}});
      speedBtns.forEach(btn=>{btn.addEventListener('click',function(){speedBtns.forEach(b=>b.classList.remove('active'));this.classList.add('active');animationSpeed=this.dataset.speed;});});

      async function loadAndDisplay(unicode) {
        if(practiceMode!=='none')exitPracticeMode(); isAnimating=false;
        const svgDoc=await loadSvg(unicode); currentSvgDoc=svgDoc;
        if(!svgDoc){svgContainer.innerHTML='<p style="color:#ccc;">SVGが見つかりませんでした</p>';strokePaths=[];updateUI();return;}
        strokePaths=extractStrokes(svgDoc); displaySvg(svgDoc);
        if(strokePaths.length>0){currentStrokeIndex=-1;animateToStroke(0);}else updateUI();
      }

      function init() {
        selectedCharDisplay.textContent=currentChar; setQuizMode('select'); listenTraceBtn.style.display='inline-block';
        loadAndDisplay(currentUnicode);
      }
      init();
    })();
  </script>
</body>
