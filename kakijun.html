<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>書き順アニメーション - 音声＆出題モード対応</title>
  <style>
    body {
      font-family: 'Yu Gothic', '游ゴシック', sans-serif;
      text-align: center;
      background: #faf8f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #4a4a4a;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
    .kana-display {
      width: 250px;
      height: 250px;
      margin: 20px auto;
      background: #fffef9;
      border: 3px dashed #e0d6c2;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.3s;
    }
    .kana-display.hidden-char {
      background: #f0ebe0;
      border-color: #ff9800;
    }
    .kana-display svg {
      width: 200px;
      height: 200px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .kana-display.hidden-char svg {
      opacity: 0.08;
      filter: blur(4px);
    }
    #drawCanvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      touch-action: none;
      display: none;
      z-index: 10;
    }
    .info {
      font-size: 1.4rem;
      margin: 10px 0;
      min-height: 30px;
      transition: 0.2s;
    }
    .feedback {
      font-size: 1.1rem;
      min-height: 24px;
      margin: 5px 0;
    }
    .stroke-counter {
      font-size: 1rem;
      color: #888;
    }
    button {
      background: #f0e6d3;
      border: none;
      padding: 12px 28px;
      font-size: 1.2rem;
      border-radius: 40px;
      margin: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #5a4a3a;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #e0d6c2;
      min-width: 44px;
      min-height: 44px;
    }
    button:hover {
      background: #e8d9be;
    }
    button:active {
      background: #d4c3a5;
      transform: scale(0.96);
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .speed-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      margin: 4px;
      background: #fff;
      border: 1px solid #d4c3a5;
    }
    .speed-btn.active {
      background: #d4c3a5;
      color: white;
      border-color: #b8a080;
    }
    .controls {
      margin: 20px 0;
    }
    .mode-selector {
      margin: 10px 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .mode-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: #fff;
      border: 2px solid #e0d6c2;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: normal;
    }
    .mode-btn.active {
      background: #ff9800;
      color: white;
      border-color: #f57c00;
    }
    select {
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: white;
    }
    .char-select-area {
      margin: 10px 0;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .listen-btn {
      background: #ff9800;
      color: white;
      border-color: #f57c00;
      font-size: 1rem;
    }
    .listen-btn:hover {
      background: #f57c00;
    }
    .reveal-btn {
      background: #2196f3;
      color: white;
      border-color: #1976d2;
      font-size: 0.9rem;
    }
    .next-char-btn {
      background: #4caf50;
      color: white;
      border-color: #388e3c;
    }
    .number-toggle.locked {
      opacity: 0.5;
      pointer-events: none;
    }
    .number-toggle.locked label {
      cursor: not-allowed;
    }
    .mode-hint-text {
      font-size: 0.8rem;
      color: #e67e22;
      margin-top: 2px;
      display: none;
    }
    .number-toggle.locked .mode-hint-text {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ 書き順アニメーション</h1>

    <!-- 出題モード選択 -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="select">📋 えらんでかく</button>
      <button class="mode-btn" data-mode="sequential">🔢 じゅんばんに</button>
      <button class="mode-btn" data-mode="random">🎲 おまかせ</button>
    </div>

    <!-- 文字選択エリア（えらんでかくモード用） -->
    <div class="char-select-area" id="charSelectArea">
      <label for="charSelect">🔡 文字を選んでね：</label>
      <select id="charSelect"></select>
      <button id="showBtn">表示</button>
    </div>

    <div class="kana-display" id="svgContainer">
      <p style="color:#ccc;" id="placeholderText">文字を選んでね</p>
    </div>

    <div class="number-toggle" id="numberToggleArea" style="margin:8px 0;">
      <label style="font-size:0.95rem; color:#666; cursor:pointer; user-select:none;">
        <input type="checkbox" id="showNumbersCheckbox" checked style="vertical-align:middle; margin-right:4px;">
        🔢 画数を表示
      </label>
      <div class="mode-hint-text">⚠️ 書き順チェック中は番号を表示できません</div>
    </div>

    <div class="info" id="infoText"></div>
    <div class="feedback" id="feedbackText"></div>
    <div class="stroke-counter" id="strokeInfo"></div>

    <div id="speedControl" style="margin:10px 0;">
      <span style="font-size:0.9rem; color:#888;">⚡ はやさ：</span>
      <button class="speed-btn" data-speed="slow">🐢 ゆっくり</button>
      <button class="speed-btn active" data-speed="normal">🐇 ふつう</button>
      <button class="speed-btn" data-speed="fast">🐆 はやい</button>
    </div>

    <div class="controls">
      <button id="nextBtn">次の画 ▶</button>
      <br>
      <button id="traceHintBtn">🖊 なぞり練習</button>
      <button id="traceCheckBtn">🔍 書き順チェック</button>
      <button id="listenTraceBtn" style="display:none;">🔊 おとをきいてかく</button>
      <button id="revealCharBtn" style="display:none;" class="reveal-btn">👀 こたえをみる</button>
      <button id="nextCharBtn" style="display:none;" class="next-char-btn">▶ つぎのもんだい</button>
      <button id="retryTracingBtn" style="display:none;">🔄 もう一度</button>
      <button id="replaySoundBtn" style="display:none;" class="listen-btn">🔊 もういちどきく</button>
    </div>
  </div>
  <div class="footer">made with ❤️</div>

  <script>
    (function() {
      // ===== GitHub Pages パス対応 =====
      const pathParts = window.location.pathname.split('/');
      const repoName = pathParts.length > 2 ? pathParts[1] : '';
      const BASE_PATH = repoName ? `/${repoName}` : '';

      const kanaMap = [
        "あ,3042","い,3044","う,3046","え,3048","お,304A",
        "か,304B","き,304D","く,304F","け,3051","こ,3053",
        "さ,3055","し,3057","す,3059","せ,305B","そ,305D",
        "た,305F","ち,3061","つ,3064","て,3066","と,3068",
        "な,306A","に,306B","ぬ,306C","ね,306D","の,306E",
        "は,306F","ひ,3072","ふ,3075","へ,3078","ほ,307B",
        "ま,307E","み,307F","む,3080","め,3081","も,3082",
        "や,3084","ゆ,3086","よ,3088",
        "ら,3089","り,308A","る,308B","れ,308C","ろ,308D",
        "わ,308F","を,3092","ん,3093",
        "が,304C","ぎ,304E","ぐ,3050","げ,3052","ご,3054",
        "ざ,3056","じ,3058","ず,305A","ぜ,305C","ぞ,305E",
        "だ,3060","ぢ,3062","づ,3065","で,3067","ど,3069",
        "ば,3070","び,3073","ぶ,3076","べ,3079","ぼ,307C",
        "ぱ,3071","ぴ,3074","ぷ,3077","ぺ,307A","ぽ,307D",
        "ア,30A2","イ,30A4","ウ,30A6","エ,30A8","オ,30AA",
        "カ,30AB","キ,30AD","ク,30AF","ケ,30B1","コ,30B3",
        "サ,30B5","シ,30B7","ス,30B9","セ,30BB","ソ,30BD",
        "タ,30BF","チ,30C1","ツ,30C4","テ,30C6","ト,30C8",
        "ナ,30CA","ニ,30CB","ヌ,30CC","ネ,30CD","ノ,30CE",
        "ハ,30CF","ヒ,30D2","フ,30D5","ヘ,30D8","ホ,30DB",
        "マ,30DE","ミ,30DF","ム,30E0","メ,30E1","モ,30E2",
        "ヤ,30E4","ユ,30E6","ヨ,30E8",
        "ラ,30E9","リ,30EA","ル,30EB","レ,30EC","ロ,30ED",
        "ワ,30EF","ヲ,30F2","ン,30F3",
        "ガ,30AC","ギ,30AE","グ,30B0","ゲ,30B2","ゴ,30B4",
        "ザ,30B6","ジ,30B8","ズ,30BA","ゼ,30BC","ゾ,30BE",
        "ダ,30C0","ヂ,30C2","ヅ,30C5","デ,30C7","ド,30C9",
        "バ,30D0","ビ,30D3","ブ,30D6","ベ,30D9","ボ,30DC",
        "パ,30D1","ピ,30D4","プ,30D7","ペ,30DA","ポ,30DD"
      ];

      let quizMode = 'select';
      let currentQuizIndex = 0;
      let isListeningMode = false;
      let characterHidden = false;
      let speechSynthesis = window.speechSynthesis;
      let currentChar = '';
      let currentUnicode = '';

      let currentSvgDoc = null;
      let strokePaths = [];
      let strokeSamplePoints = [];
      let currentStrokeIndex = -1;
      let animationSpeed = 'normal';
      let isAnimating = false;

      let practiceMode = 'none';
      let expectedStrokeIndex = 0;
      let userDrawnPoints = [];
      let savedStrokes = [];
      let feedbackTimer = null;

      const STROKE_LINE_COLORS = ['#ff6fa5', '#2196f3', '#4caf50', '#ff9800', '#9c27b0', '#111111'];
      function getStrokeLineColor(idx) {
        return STROKE_LINE_COLORS[idx] !== undefined ? STROKE_LINE_COLORS[idx] : '#111111';
      }
      function getStrokeNumberColor(idx) {
        return idx === 0 ? '#ff6fa5' : '#2196f3';
      }
      let showStrokeNumbers = true;
      let strokeNumbersLocked = false;

      const speedBaseDurations = { slow: 2000, normal: 800, fast: 300 };
      const BASE_LENGTH = 200;
      const MIN_DURATION = 100;

      const DISTANCE_THRESHOLD_GOOD = 12;
      const DISTANCE_THRESHOLD_OK = 25;
      const START_DISTANCE_THRESHOLD = 30;
      const MATCH_DISTANCE_THRESHOLD = 35;
      const COVERAGE_THRESHOLD_GOOD = 0.7;
      const COVERAGE_THRESHOLD_OK = 0.5;
      const LENGTH_RATIO_MIN = 0.3;

      const selectEl = document.getElementById('charSelect');
      const showBtn = document.getElementById('showBtn');
      const svgContainer = document.getElementById('svgContainer');
      const infoText = document.getElementById('infoText');
      const feedbackText = document.getElementById('feedbackText');
      const strokeInfo = document.getElementById('strokeInfo');
      const nextBtn = document.getElementById('nextBtn');
      const speedControl = document.getElementById('speedControl');
      const speedBtns = document.querySelectorAll('.speed-btn');
      const traceHintBtn = document.getElementById('traceHintBtn');
      const traceCheckBtn = document.getElementById('traceCheckBtn');
      const listenTraceBtn = document.getElementById('listenTraceBtn');
      const revealCharBtn = document.getElementById('revealCharBtn');
      const nextCharBtn = document.getElementById('nextCharBtn');
      const retryTracingBtn = document.getElementById('retryTracingBtn');
      const replaySoundBtn = document.getElementById('replaySoundBtn');
      const showNumbersCheckbox = document.getElementById('showNumbersCheckbox');
      const numberToggleArea = document.getElementById('numberToggleArea');
      const charSelectArea = document.getElementById('charSelectArea');
      const modeBtns = document.querySelectorAll('.mode-btn');
      const placeholderText = document.getElementById('placeholderText');
      
      let canvas, ctx;
      let isDrawing = false;
      let isFlashing = false;

      function lockStrokeNumbers(locked) {
        strokeNumbersLocked = locked;
        if (locked) {
          showNumbersCheckbox.checked = false;
          showStrokeNumbers = false;
          numberToggleArea.classList.add('locked');
          showNumbersCheckbox.disabled = true;
        } else {
          numberToggleArea.classList.remove('locked');
          showNumbersCheckbox.disabled = false;
          showNumbersCheckbox.checked = true;
          showStrokeNumbers = true;
        }
        updateStrokeNumbersVisibility();
      }

      function updateStrokeNumbersVisibility() {
        const g = svgContainer.querySelector('#strokeNumbersGroup');
        if (g) {
          if (strokeNumbersLocked || !showStrokeNumbers) {
            g.style.display = 'none';
          } else {
            g.style.display = '';
          }
        }
      }

      function speakCharacter(char) {
        if (!speechSynthesis) {
          return;
        }
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(char);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.8;
        utterance.pitch = 1.2;
        utterance.volume = 1;
        const voices = speechSynthesis.getVoices();
        const jaVoice = voices.find(v => v.lang.startsWith('ja'));
        if (jaVoice) {
          utterance.voice = jaVoice;
        }
        speechSynthesis.speak(utterance);
      }

      function replaySound() {
        if (currentChar) {
          speakCharacter(currentChar);
          setFeedback('🔊 もういちど、きいてね');
        }
      }

      function setQuizMode(mode) {
        quizMode = mode;
        modeBtns.forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
        if (mode === 'select') {
          charSelectArea.style.display = 'block';
          nextCharBtn.style.display = 'none';
          showBtn.style.display = 'inline-block';
        } else {
          charSelectArea.style.display = 'none';
          showBtn.style.display = 'none';
          if (isListeningMode) {
            nextCharBtn.style.display = 'inline-block';
          }
        }
      }

      function getNextSequentialChar() {
        const item = kanaMap[currentQuizIndex];
        currentQuizIndex = (currentQuizIndex + 1) % kanaMap.length;
        return item;
      }

      function getRandomChar() {
        const randomIndex = Math.floor(Math.random() * kanaMap.length);
        return kanaMap[randomIndex];
      }

      function loadQuizChar() {
        let item;
        if (quizMode === 'sequential') {
          item = getNextSequentialChar();
        } else if (quizMode === 'random') {
          item = getRandomChar();
        } else {
          item = `${selectEl.options[selectEl.selectedIndex]?.textContent || kanaMap[0].split(',')[0]},${selectEl.value || kanaMap[0].split(',')[1]}`;
        }
        const [char, code] = item.split(',');
        currentChar = char;
        currentUnicode = code;
        if (quizMode !== 'select') {
          selectEl.value = code;
        }
        return code; // return code for external use
      }

      function hideCharacter() {
        characterHidden = true;
        svgContainer.classList.add('hidden-char');
        if (placeholderText) placeholderText.textContent = '？';
        revealCharBtn.style.display = 'inline-block';
        replaySoundBtn.style.display = 'inline-block';
      }

      function revealCharacter() {
        characterHidden = false;
        svgContainer.classList.remove('hidden-char');
        if (placeholderText) placeholderText.textContent = '';
        revealCharBtn.style.display = 'none';
        replaySoundBtn.style.display = 'none';
        setFeedback(`👀 こたえは「${currentChar}」だよ！`);
      }

      // アニメーションなしでSVGを読み込み表示する（マスク用）
      async function loadSvgAndPrepare(unicode) {
        const svgDoc = await loadSvg(unicode);
        currentSvgDoc = svgDoc;
        if (!svgDoc) {
          svgContainer.innerHTML = '<p style="color:#ccc;">SVGが見つかりませんでした</p>';
          strokePaths = [];
          return;
        }
        strokePaths = extractStrokes(svgDoc);
        displaySvg(svgDoc); // Canvasも生成
        // マスクを維持
        if (characterHidden) {
          svgContainer.classList.add('hidden-char');
        }
      }

      function startListeningMode() {
        calculateAllSamplePoints();
        practiceMode = 'listen';
        isListeningMode = true;
        expectedStrokeIndex = 0;
        userDrawnPoints = [];
        savedStrokes = [];
        lockStrokeNumbers(false);
        strokePaths.forEach(p => {
          p.style.display = 'block';
          p.style.stroke = '#d0d0d0';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        hideCharacter();
        speakCharacter(currentChar);
        canvas.style.display = 'block';
        retryTracingBtn.style.display = 'inline-block';
        listenTraceBtn.textContent = '🔙 書き順アニメーション';
        if (quizMode !== 'select') {
          nextCharBtn.style.display = 'inline-block';
        }
        setupCanvas();
        isAnimating = false;
        updateUI();
        attachDrawEvents();
        setFeedback('🔊 おとをきいて、かいてね');
      }

      function enterListeningMode() {
        if (!strokePaths.length) return;
        if (!speechSynthesis) {
          setFeedback('⚠️ おとに非対応のブラウザです', false);
          return;
        }
        if (speechSynthesis.getVoices().length === 0) {
          speechSynthesis.addEventListener('voiceschanged', () => {
            startListeningMode();
          }, { once: true });
        } else {
          startListeningMode();
        }
      }

      function exitListeningMode() {
        isListeningMode = false;
        characterHidden = false;
        svgContainer.classList.remove('hidden-char');
        if (placeholderText) placeholderText.textContent = '';
        revealCharBtn.style.display = 'none';
        replaySoundBtn.style.display = 'none';
        nextCharBtn.style.display = 'none';
        lockStrokeNumbers(false);
        canvas.style.display = 'none';
        retryTracingBtn.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        applyStrokeColors(strokePaths);
        practiceMode = 'none';
        currentStrokeIndex = -1;
        isAnimating = false;
        updateUI();
        removeDrawEvents();
        clearFeedback();
        listenTraceBtn.textContent = '🔊 おとをきいてかく';
      }

      function populateSelect() {
        kanaMap.forEach(item => {
          const [char, code] = item.split(',');
          const option = document.createElement('option');
          option.value = code;
          option.textContent = char;
          selectEl.appendChild(option);
        });
      }

      async function loadSvg(unicode) {
        try {
          const paddedCode = unicode.toLowerCase().padStart(5, '0');
          const svgUrl = `${BASE_PATH}/svg/${paddedCode}.svg`;
          let response = await fetch(svgUrl);
          if (!response.ok) {
            const altUrl = `./svg/${paddedCode}.svg`;
            response = await fetch(altUrl);
          }
          if (!response.ok) {
            throw new Error(`SVG load failed (status: ${response.status})`);
          }
          const svgText = await response.text();
          const parser = new DOMParser();
          return parser.parseFromString(svgText, 'image/svg+xml');
        } catch (err) {
          console.error('SVG load error:', err);
          return null;
        }
      }

      function extractStrokes(svgDoc) {
        const paths = [];
        const allG = svgDoc.querySelectorAll('g');
        let strokePathsG = null;
        allG.forEach(g => {
          if ((g.getAttribute('id') || '').includes('StrokePaths')) strokePathsG = g;
        });
        if (strokePathsG) {
          const innerG = strokePathsG.querySelector('g');
          if (innerG) {
            innerG.querySelectorAll('path').forEach(p => {
              if (p.getAttribute('d')) paths.push(p);
            });
          }
        }
        if (paths.length === 0) {
          const pathElements = svgDoc.querySelectorAll('path');
          const temp = [];
          pathElements.forEach(p => {
            const m = (p.getAttribute('id') || '').match(/-s(\d+)$/);
            if (m && p.getAttribute('d')) temp.push({ path: p, num: parseInt(m[1]) });
          });
          temp.sort((a, b) => a.num - b.num);
          temp.forEach(item => paths.push(item.path));
        }
        return paths;
      }

      function samplePath(path, step = 5) {
        const points = [];
        const length = path.getTotalLength();
        if (length === 0) return points;
        let dist = 0;
        while (dist <= length) {
          const pt = path.getPointAtLength(dist);
          points.push({ x: pt.x, y: pt.y });
          dist += step;
        }
        const endPt = path.getPointAtLength(length);
        if (points.length === 0 || points[points.length-1].x !== endPt.x || points[points.length-1].y !== endPt.y) {
          points.push({ x: endPt.x, y: endPt.y });
        }
        return points;
      }

      function calculateAllSamplePoints() {
        strokeSamplePoints = strokePaths.map(path => samplePath(path, 5));
      }

      function minDistanceToPath(point, samplePoints) {
        let min = Infinity;
        for (const sp of samplePoints) {
          const dx = point.x - sp.x;
          const dy = point.y - sp.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < min) min = dist;
        }
        return min;
      }

      function averageDistance(drawnPoints, samplePoints) {
        if (drawnPoints.length === 0) return Infinity;
        const total = drawnPoints.reduce((sum, p) => sum + minDistanceToPath(p, samplePoints), 0);
        return total / drawnPoints.length;
      }

      function calcCoverage(drawnPoints, samplePoints, threshold = 15) {
        if (drawnPoints.length === 0 || samplePoints.length === 0) return 0;
        let covered = 0;
        for (const sp of samplePoints) {
          const dist = minDistanceToPath(sp, drawnPoints);
          if (dist <= threshold) covered++;
        }
        return covered / samplePoints.length;
      }

      function calcDrawnLength(points) {
        let len = 0;
        for (let i = 1; i < points.length; i++) {
          const dx = points[i].x - points[i-1].x;
          const dy = points[i].y - points[i-1].y;
          len += Math.sqrt(dx*dx + dy*dy);
        }
        return len;
      }

      function checkStartPosition(drawnPoints, samplePoints, threshold) {
        const checkCount = Math.min(5, drawnPoints.length);
        if (checkCount === 0) return Infinity;
        let total = 0;
        for (let i = 0; i < checkCount; i++) {
          total += minDistanceToPath(drawnPoints[i], samplePoints);
        }
        return total / checkCount;
      }

      function findClosestStroke(drawnPoints) {
        let bestIdx = -1;
        let bestScore = Infinity;
        for (let i = 0; i < strokeSamplePoints.length; i++) {
          const avg = averageDistance(drawnPoints, strokeSamplePoints[i]);
          if (avg > MATCH_DISTANCE_THRESHOLD) continue;
          const cov = calcCoverage(drawnPoints, strokeSamplePoints[i], 15);
          const score = avg - cov * 15;
          if (score < bestScore) {
            bestScore = score;
            bestIdx = i;
          }
        }
        return bestIdx;
      }

      function parseViewBox(svgRoot) {
        const vb = svgRoot.getAttribute('viewBox');
        if (vb) {
          const parts = vb.trim().split(/\s+/).map(Number);
          if (parts.length === 4 && parts.every(n => !isNaN(n))) {
            return { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
          }
        }
        return { x: 0, y: 0, w: 109, h: 109 };
      }

      function addCrosshairGuide(svgRoot) {
        const ns = 'http://www.w3.org/2000/svg';
        const vb = parseViewBox(svgRoot);
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('id', 'crosshairGuide');
        const vLine = document.createElementNS(ns, 'line');
        vLine.setAttribute('x1', vb.x + vb.w / 2);
        vLine.setAttribute('y1', vb.y);
        vLine.setAttribute('x2', vb.x + vb.w / 2);
        vLine.setAttribute('y2', vb.y + vb.h);
        const hLine = document.createElementNS(ns, 'line');
        hLine.setAttribute('x1', vb.x);
        hLine.setAttribute('y1', vb.y + vb.h / 2);
        hLine.setAttribute('x2', vb.x + vb.w);
        hLine.setAttribute('y2', vb.y + vb.h / 2);
        [vLine, hLine].forEach(line => {
          line.setAttribute('stroke', '#7ec8e3');
          line.setAttribute('stroke-width', Math.max(0.5, vb.w * 0.006));
          line.setAttribute('stroke-dasharray', `${vb.w * 0.02},${vb.w * 0.015}`);
          g.appendChild(line);
        });
        svgRoot.insertBefore(g, svgRoot.firstChild);
      }

      function strokeStartLabelPos(path, offsetDist) {
        const total = path.getTotalLength();
        if (total === 0) {
          return { x: 0, y: 0 };
        }
        const p0 = path.getPointAtLength(0);
        const p1 = path.getPointAtLength(Math.min(total, 6));
        let dx = p1.x - p0.x;
        let dy = p1.y - p0.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        dx /= len; dy /= len;
        const perpX = -dy;
        const perpY = dx;
        const backX = -dx;
        const backY = -dy;
        return {
          x: p0.x + perpX * offsetDist * 0.7 + backX * offsetDist * 0.6,
          y: p0.y + perpY * offsetDist * 0.7 + backY * offsetDist * 0.6
        };
      }

      function addStrokeNumbers(svgRoot, paths) {
        const ns = 'http://www.w3.org/2000/svg';
        const vb = parseViewBox(svgRoot);
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('id', 'strokeNumbersGroup');
        const fontSize = vb.w * 0.11;
        const offsetDist = vb.w * 0.075;
        paths.forEach((path, idx) => {
          const pos = strokeStartLabelPos(path, offsetDist);
          const text = document.createElementNS(ns, 'text');
          text.textContent = String(idx + 1);
          text.setAttribute('x', pos.x);
          text.setAttribute('y', pos.y);
          text.setAttribute('font-size', fontSize);
          text.setAttribute('font-weight', 'bold');
          text.setAttribute('fill', getStrokeNumberColor(idx));
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('dominant-baseline', 'central');
          text.setAttribute('font-family', "'Yu Gothic', '游ゴシック', sans-serif");
          text.style.paintOrder = 'stroke';
          text.style.stroke = '#fff';
          text.style.strokeWidth = String(fontSize * 0.18);
          text.style.strokeLinejoin = 'round';
          g.appendChild(text);
        });
        svgRoot.appendChild(g);
        g.style.display = (strokeNumbersLocked || !showStrokeNumbers) ? 'none' : '';
      }

      function applyStrokeColors(paths) {
        paths.forEach((p, idx) => {
          p.style.stroke = getStrokeLineColor(idx);
        });
      }

      function displaySvg(svgDoc) {
        svgContainer.innerHTML = '';
        const placeholderP = document.createElement('p');
        placeholderP.style.cssText = 'color:#ccc;';
        placeholderP.id = 'placeholderText';
        placeholderP.textContent = characterHidden ? '？' : '';
        svgContainer.appendChild(placeholderP);
        
        if (!svgDoc) {
          placeholderP.textContent = 'SVGが見つかりませんでした';
          return null;
        }
        const svgRoot = svgDoc.querySelector('svg');
        if (!svgRoot) {
          placeholderP.textContent = '無効なSVGです';
          return null;
        }
        svgRoot.setAttribute('width', '200');
        svgRoot.setAttribute('height', '200');
        svgRoot.style.display = 'block';
        svgRoot.style.margin = 'auto';
        svgRoot.style.pointerEvents = 'none';
        svgRoot.querySelectorAll('path').forEach(p => {
          p.style.display = 'none';
          p.style.strokeWidth = '9';
          p.style.strokeLinecap = 'round';
          p.style.strokeLinejoin = 'round';
          p.style.fill = 'none';
          p.style.transition = 'none';
        });
        svgRoot.querySelectorAll('text').forEach(t => t.style.display = 'none');

        addCrosshairGuide(svgRoot);
        applyStrokeColors(strokePaths);
        addStrokeNumbers(svgRoot, strokePaths);

        svgContainer.appendChild(svgRoot);

        const newCanvas = document.createElement('canvas');
        newCanvas.id = 'drawCanvas';
        newCanvas.style.display = 'none';
        svgContainer.appendChild(newCanvas);
        canvas = newCanvas;
        ctx = canvas.getContext('2d');
        setupCanvas();
        
        if (characterHidden) {
          svgContainer.classList.add('hidden-char');
        }
        
        return svgRoot;
      }

      function setupCanvas() {
        if (!canvas) return;
        const svg = svgContainer.querySelector('svg');
        if (!svg) return;
        const viewBox = svg.getAttribute('viewBox');
        if (viewBox) {
          const parts = viewBox.split(/\s+/);
          canvas.width = parseFloat(parts[2]);
          canvas.height = parseFloat(parts[3]);
        } else {
          canvas.width = 200;
          canvas.height = 200;
        }
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#333';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }

      function enterPracticeMode(mode) {
        if (!strokePaths.length) return;
        calculateAllSamplePoints();
        practiceMode = mode;
        expectedStrokeIndex = 0;
        userDrawnPoints = [];
        savedStrokes = [];
        
        if (mode === 'check') {
          lockStrokeNumbers(true);
        } else {
          lockStrokeNumbers(false);
        }
        
        strokePaths.forEach(p => {
          p.style.display = 'block';
          p.style.stroke = '#d0d0d0';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        if (mode === 'hint') {
          updateHighlight();
          setFeedback('🔵 あおい線をなぞってね');
        } else if (mode === 'check') {
          setFeedback('🔍 じぶんで書き順を考えてね（番号はかくされています）');
        }
        canvas.style.display = 'block';
        retryTracingBtn.style.display = 'inline-block';
        setupCanvas();
        isAnimating = false;
        updateUI();
        attachDrawEvents();
      }

      function exitPracticeMode() {
        lockStrokeNumbers(false);
        canvas.style.display = 'none';
        retryTracingBtn.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        applyStrokeColors(strokePaths);
        practiceMode = 'none';
        currentStrokeIndex = -1;
        isAnimating = false;
        updateUI();
        removeDrawEvents();
        clearFeedback();
      }

      function updateHighlight() {
        if (practiceMode !== 'hint') return;
        strokePaths.forEach((p, idx) => {
          if (idx === expectedStrokeIndex) {
            p.style.stroke = '#4a90d9';
            p.style.strokeWidth = '10';
            p.parentNode.appendChild(p);
          } else {
            p.style.stroke = '#d0d0d0';
            p.style.strokeWidth = '9';
          }
        });
      }

      function setFeedback(msg, isGood = true) {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = msg;
        feedbackText.style.color = isGood ? '#2a7d2a' : '#c0392b';
        if (!msg.includes('あおい線') && !msg.includes('書き順を考えてね') && !msg.includes('つぎの画') && !msg.includes('きいてね') && !msg.includes('番号')) {
          feedbackTimer = setTimeout(() => {
            feedbackText.textContent = '';
          }, 2000);
        }
      }

      function clearFeedback() {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = '';
      }

      function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 6;
        for (const path of savedStrokes) {
          ctx.beginPath();
          ctx.moveTo(path[0].x, path[0].y);
          for (let i = 1; i < path.length; i++) {
            ctx.lineTo(path[i].x, path[i].y);
          }
          ctx.stroke();
        }
      }

      function flashAndRemoveWrongStroke(points) {
        if (!points || points.length === 0) return;
        isFlashing = true;
        canvas.style.pointerEvents = 'none';
        
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();

        setTimeout(() => {
          redrawCanvas();
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 6;
          isFlashing = false;
          canvas.style.pointerEvents = 'auto';
        }, 500);
      }

      function attachDrawEvents() {
        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointermove', onPointerMove);
        canvas.addEventListener('pointerup', onPointerUp);
        canvas.addEventListener('pointerleave', onPointerUp);
      }

      function removeDrawEvents() {
        canvas.removeEventListener('pointerdown', onPointerDown);
        canvas.removeEventListener('pointermove', onPointerMove);
        canvas.removeEventListener('pointerup', onPointerUp);
        canvas.removeEventListener('pointerleave', onPointerUp);
      }

      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      function onPointerDown(e) {
        if (practiceMode === 'none' || isFlashing) return;
        const { x, y } = getCanvasCoords(e);
        isDrawing = true;
        userDrawnPoints = [{x, y}];
        ctx.beginPath();
        ctx.moveTo(x, y);
        e.preventDefault();
      }

      function onPointerMove(e) {
        if (!isDrawing || practiceMode === 'none' || isFlashing) return;
        const { x, y } = getCanvasCoords(e);
        userDrawnPoints.push({x, y});
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        e.preventDefault();
      }

      function handleStrokeCompletion() {
        if (practiceMode === 'listen' && expectedStrokeIndex >= strokePaths.length) {
          setFeedback('🎉 ぜんぶかけたね！すごい！');
          if (characterHidden) {
            setTimeout(() => {
              revealCharacter();
            }, 1000);
          }
          if (quizMode !== 'select') {
            nextCharBtn.style.display = 'inline-block';
          }
        }
      }

      function onPointerUp(e) {
        if (!isDrawing || practiceMode === 'none' || isFlashing) return;
        isDrawing = false;
        ctx.beginPath();

        if (userDrawnPoints.length < 3) {
          setFeedback('✍️ もっと長くなぞってね', false);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          redrawCanvas();
          userDrawnPoints = [];
          return;
        }

        const drawnLength = calcDrawnLength(userDrawnPoints);

        if (practiceMode === 'hint' || practiceMode === 'listen') {
          const startAvg = checkStartPosition(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex], START_DISTANCE_THRESHOLD);
          if (startAvg > START_DISTANCE_THRESHOLD) {
            setFeedback('❌ 書き順がちがうよ！あおい線をなぞってね', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
            userDrawnPoints = [];
            return;
          }

          const pathLength = strokePaths[expectedStrokeIndex].getTotalLength();
          if (drawnLength < pathLength * LENGTH_RATIO_MIN) {
            setFeedback('✍️ もっと長くなぞってね', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
            userDrawnPoints = [];
            return;
          }

          const avgDist = averageDistance(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex]);
          const coverage = calcCoverage(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex], 15);

          if (avgDist <= DISTANCE_THRESHOLD_GOOD && coverage >= COVERAGE_THRESHOLD_GOOD) {
            savedStrokes.push([...userDrawnPoints]);
            setFeedback('🌟 じょうず！');
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
              handleStrokeCompletion();
            } else {
              updateHighlight();
              setFeedback(practiceMode === 'listen' ? '🔊 つぎの画を書いてね' : '🔵 つぎのあおい線をなぞってね');
            }
          } else if (avgDist <= DISTANCE_THRESHOLD_OK && coverage >= COVERAGE_THRESHOLD_OK) {
            savedStrokes.push([...userDrawnPoints]);
            setFeedback('👍 まあまあ！');
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
              handleStrokeCompletion();
            } else {
              updateHighlight();
              setFeedback(practiceMode === 'listen' ? '🔊 つぎの画を書いてね' : '🔵 つぎのあおい線をなぞってね');
            }
          } else {
            setFeedback('💧 もうすこし！もういちど書いてね', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
          }
          updateUI();
        } else if (practiceMode === 'check') {
          const closestIdx = findClosestStroke(userDrawnPoints);
          if (closestIdx === -1) {
            setFeedback('❌ 書き順がわからないよ、もういちど', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
            userDrawnPoints = [];
            return;
          }

          if (closestIdx !== expectedStrokeIndex) {
            setFeedback('❌ 書き順がちがうよ！もういちど（ヒント：番号はかくされています）', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
            userDrawnPoints = [];
            return;
          }

          const pathLength = strokePaths[expectedStrokeIndex].getTotalLength();
          if (drawnLength < pathLength * LENGTH_RATIO_MIN) {
            setFeedback('✍️ もっと長くなぞってね', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
            userDrawnPoints = [];
            return;
          }

          const avgDist = averageDistance(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex]);
          const coverage = calcCoverage(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex], 15);

          if (avgDist <= DISTANCE_THRESHOLD_GOOD && coverage >= COVERAGE_THRESHOLD_GOOD) {
            savedStrokes.push([...userDrawnPoints]);
            setFeedback('🌟 じょうず！');
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
            } else {
              setFeedback('🔍 つぎの画を書いてね');
            }
          } else if (avgDist <= DISTANCE_THRESHOLD_OK && coverage >= COVERAGE_THRESHOLD_OK) {
            savedStrokes.push([...userDrawnPoints]);
            setFeedback('👍 まあまあ！');
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
            } else {
              setFeedback('🔍 つぎの画を書いてね');
            }
          } else {
            setFeedback('💧 もうすこし！もういちど書いてね', false);
            flashAndRemoveWrongStroke(userDrawnPoints);
          }
          updateUI();
        }
        userDrawnPoints = [];
      }

      function retryTracing() {
        if (practiceMode === 'none') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        savedStrokes = [];
        expectedStrokeIndex = 0;
        userDrawnPoints = [];
        updateHighlight();
        updateUI();
        if (practiceMode === 'listen') {
          setFeedback('🔊 もういちど、おとをきいてかいてね');
          speakCharacter(currentChar);
        } else if (practiceMode === 'hint') {
          setFeedback('🔵 もういちど、あおい線をなぞってね');
        } else if (practiceMode === 'check') {
          setFeedback('🔍 もういちど書いてね（番号はかくされています）');
        }
      }

      function animateSingleStroke(path, duration) {
        return new Promise(resolve => {
          try {
            const length = path.getTotalLength();
            if (length === 0) { path.style.display = 'block'; resolve(); return; }
            path.style.display = 'block';
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
            path.style.transition = `stroke-dashoffset ${duration}ms ease-in-out`;
            path.getBoundingClientRect();
            path.style.strokeDashoffset = '0';
            const onEnd = () => {
              path.removeEventListener('transitionend', onEnd);
              path.style.transition = 'none';
              path.style.strokeDasharray = 'none';
              path.style.strokeDashoffset = '0';
              resolve();
            };
            path.addEventListener('transitionend', onEnd);
            setTimeout(() => {
              if (path.style.strokeDasharray !== 'none') {
                path.style.transition = 'none';
                path.style.strokeDasharray = 'none';
                path.style.strokeDashoffset = '0';
                resolve();
              }
            }, duration + 100);
          } catch (e) {
            path.style.display = 'block';
            resolve();
          }
        });
      }

      function resetAllStrokes() {
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
      }

      async function animateToStroke(targetIndex) {
        if (!strokePaths.length || isAnimating || practiceMode !== 'none') return;
        targetIndex = Math.min(Math.max(targetIndex, 0), strokePaths.length - 1);
        const prevIndex = currentStrokeIndex;
        if (targetIndex <= prevIndex || prevIndex === -1) {
          resetAllStrokes();
          currentStrokeIndex = -1;
        }
        isAnimating = true;
        updateUI();
        try {
          for (let i = Math.max(0, prevIndex + 1); i <= targetIndex; i++) {
            if (i <= prevIndex) continue;
            const pathLength = strokePaths[i].getTotalLength();
            const baseDuration = speedBaseDurations[animationSpeed];
            let duration = (pathLength / BASE_LENGTH) * baseDuration;
            if (duration < MIN_DURATION) duration = MIN_DURATION;
            await animateSingleStroke(strokePaths[i], duration);
            currentStrokeIndex = i;
            updateUI();
          }
        } finally {
          isAnimating = false;
          updateUI();
        }
      }

      function updateUI() {
        if (!strokePaths.length) {
          infoText.textContent = 'ストロークが見つかりません';
          strokeInfo.textContent = '';
          nextBtn.disabled = true;
          return;
        }

        if (practiceMode === 'hint' || practiceMode === 'check' || practiceMode === 'listen') {
          const displayIndex = Math.min(expectedStrokeIndex + 1, strokePaths.length);
          let modeLabel = 'なぞり中';
          if (practiceMode === 'listen') modeLabel = 'おとをきいてかく';
          else if (practiceMode === 'check') modeLabel = '書き順チェック';
          infoText.textContent = `✏️ ${modeLabel}：${displayIndex} / ${strokePaths.length} 画め`;
          strokeInfo.textContent = `全 ${strokePaths.length} 画`;
          nextBtn.style.display = 'none';
          speedControl.style.display = 'none';
          
          traceHintBtn.textContent = (practiceMode === 'hint') ? '🔙 書き順アニメーション' : '🖊 なぞり練習';
          traceCheckBtn.textContent = (practiceMode === 'check') ? '🔙 書き順アニメーション' : '🔍 書き順チェック';
          listenTraceBtn.textContent = (practiceMode === 'listen') ? '🔙 書き順アニメーション' : '🔊 おとをきいてかく';
          retryTracingBtn.style.display = 'inline-block';
          return;
        }

        const total = strokePaths.length;
        const current = currentStrokeIndex + 1;
        infoText.textContent = `✏️ ${current} / ${total} 画`;
        strokeInfo.textContent = `全 ${total} 画`;
        nextBtn.style.display = 'inline-block';
        nextBtn.disabled = isAnimating;
        speedControl.style.display = 'block';
        
        traceHintBtn.textContent = '🖊 なぞり練習';
        traceCheckBtn.textContent = '🔍 書き順チェック';
        listenTraceBtn.textContent = '🔊 おとをきいてかく';
        retryTracingBtn.style.display = 'none';
      }

      async function loadAndDisplay(unicode) {
        if (practiceMode !== 'none') exitPracticeMode();
        isAnimating = false;
        const svgDoc = await loadSvg(unicode);
        currentSvgDoc = svgDoc;
        if (!svgDoc) {
          svgContainer.innerHTML = '<p style="color:#ccc;">SVGが見つかりませんでした</p>';
          strokePaths = [];
          updateUI();
          return;
        }
        strokePaths = extractStrokes(svgDoc);
        displaySvg(svgDoc);
        if (strokePaths.length > 0) {
          currentStrokeIndex = -1;
          animateToStroke(0);
        } else {
          updateUI();
        }
      }

      // ===== Event Listeners =====
      
      modeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const mode = this.dataset.mode;
          setQuizMode(mode);
          if (practiceMode === 'listen') {
            exitListeningMode();
          } else if (practiceMode !== 'none') {
            exitPracticeMode();
          }
          loadQuizChar();
          loadAndDisplay(currentUnicode);
        });
      });

      showBtn.addEventListener('click', () => {
        if (selectEl.value) {
          const char = selectEl.options[selectEl.selectedIndex].textContent;
          currentChar = char;
          currentUnicode = selectEl.value;
          loadAndDisplay(selectEl.value);
        }
      });

      nextBtn.addEventListener('click', () => {
        if (practiceMode !== 'none' || isAnimating) return;
        if (currentStrokeIndex >= strokePaths.length - 1) {
          animateToStroke(0);
        } else {
          animateToStroke(currentStrokeIndex + 1);
        }
      });

      traceHintBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') {
          exitListeningMode();
          enterPracticeMode('hint');
        } else if (practiceMode === 'hint') {
          exitPracticeMode();
        } else if (practiceMode === 'check') {
          exitPracticeMode();
          enterPracticeMode('hint');
        } else {
          enterPracticeMode('hint');
        }
      });

      traceCheckBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') {
          exitListeningMode();
          enterPracticeMode('check');
        } else if (practiceMode === 'check') {
          exitPracticeMode();
        } else if (practiceMode === 'hint') {
          exitPracticeMode();
          enterPracticeMode('check');
        } else {
          enterPracticeMode('check');
        }
      });

      listenTraceBtn.addEventListener('click', () => {
        if (practiceMode === 'listen') {
          exitListeningMode();
        } else {
          if (practiceMode !== 'none') exitPracticeMode();
          enterListeningMode();
        }
      });

      revealCharBtn.addEventListener('click', revealCharacter);

      nextCharBtn.addEventListener('click', async () => {
        if (practiceMode === 'listen') {
          // マスクを維持したまま次の問題へ
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          savedStrokes = [];
          expectedStrokeIndex = 0;
          userDrawnPoints = [];
          updateHighlight();
          updateUI();

          const code = loadQuizChar();
          // マスク状態を保ったままSVGを読み込む
          await loadSvgAndPrepare(code);
          // 再度リスニングモードの初期化（マスクはloadSvgAndPrepare内で維持）
          startListeningMode();
        } else {
          // 通常モード（フォールバック）
          loadQuizChar();
          loadAndDisplay(currentUnicode);
        }
      });

      retryTracingBtn.addEventListener('click', retryTracing);
      
      replaySoundBtn.addEventListener('click', replaySound);

      showNumbersCheckbox.addEventListener('change', () => {
        if (strokeNumbersLocked) return;
        showStrokeNumbers = showNumbersCheckbox.checked;
        updateStrokeNumbersVisibility();
      });

      document.addEventListener('keydown', (e) => {
        if (practiceMode !== 'none' || isAnimating || isFlashing) return;
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (currentStrokeIndex >= strokePaths.length - 1) {
            animateToStroke(0);
          } else if (currentStrokeIndex < strokePaths.length - 1) {
            animateToStroke(currentStrokeIndex + 1);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (currentStrokeIndex > 0) {
            animateToStroke(currentStrokeIndex - 1);
          }
        }
      });

      speedBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          speedBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          animationSpeed = this.dataset.speed;
        });
      });

      function init() {
        populateSelect();
        if (kanaMap.length) {
          const firstItem = kanaMap[0];
          const [char, code] = firstItem.split(',');
          currentChar = char;
          currentUnicode = code;
          selectEl.value = code;
          loadAndDisplay(code);
        }
        setQuizMode('select');
        listenTraceBtn.style.display = 'inline-block';
      }

      init();
    })();
  </script>
</body>
</html>
