<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>書き順アニメーション - ヒントなしチェック</title>
  <style>
    body {
      font-family: 'Yu Gothic', '游ゴシック', sans-serif;
      text-align: center;
      background: #faf8f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #4a4a4a;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
    .kana-display {
      width: 250px;
      height: 250px;
      margin: 20px auto;
      background: #fffef9;
      border: 3px dashed #e0d6c2;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .kana-display svg {
      width: 200px;
      height: 200px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #drawCanvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      touch-action: none;
      display: none;
      z-index: 10;
    }
    .info {
      font-size: 1.4rem;
      margin: 10px 0;
      min-height: 30px;
      transition: 0.2s;
    }
    .feedback {
      font-size: 1.1rem;
      min-height: 24px;
      margin: 5px 0;
    }
    .stroke-counter {
      font-size: 1rem;
      color: #888;
    }
    button {
      background: #f0e6d3;
      border: none;
      padding: 12px 28px;
      font-size: 1.2rem;
      border-radius: 40px;
      margin: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #5a4a3a;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #e0d6c2;
    }
    button:hover {
      background: #e8d9be;
    }
    button:active {
      background: #d4c3a5;
      transform: scale(0.96);
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .speed-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      margin: 4px;
      background: #fff;
      border: 1px solid #d4c3a5;
    }
    .speed-btn.active {
      background: #d4c3a5;
      color: white;
      border-color: #b8a080;
    }
    .controls {
      margin: 20px 0;
    }
    select {
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: white;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ 書き順アニメーション</h1>

    <div>
      <label for="charSelect">🔡 文字を選んでね：</label>
      <select id="charSelect"></select>
      <button id="showBtn">表示</button>
    </div>

    <div class="kana-display" id="svgContainer">
      <p style="color:#ccc;">文字を選んでね</p>
    </div>

    <div class="info" id="infoText"></div>
    <div class="feedback" id="feedbackText"></div>
    <div class="stroke-counter" id="strokeInfo"></div>

    <div style="margin:10px 0;">
      <span style="font-size:0.9rem; color:#888;">⚡ はやさ：</span>
      <button class="speed-btn" data-speed="slow">🐢 ゆっくり</button>
      <button class="speed-btn active" data-speed="normal">🐇 ふつう</button>
      <button class="speed-btn" data-speed="fast">🐆 はやい</button>
    </div>

    <div class="controls">
      <button id="prevBtn">◀ 前の画</button>
      <button id="nextBtn">次の画 ▶</button>
      <br>
      <button id="replayBtn">🔄 もう一度</button>
      <button id="showAllBtn">👀 すべて表示</button>
      <br>
      <button id="traceHintBtn">🖊 なぞり練習</button>
      <button id="traceCheckBtn">🔍 書き順チェック</button>
      <button id="clearCanvasBtn" style="display:none;">🧹 けす</button>
    </div>
  </div>
  <div class="footer">made with ❤️</div>

  <script>
    (function() {
      const kanaMap = [
        "あ,3042","い,3044","う,3046","え,3048","お,304A",
        "か,304B","き,304D","く,304F","け,3051","こ,3053",
        "さ,3055","し,3057","す,3059","せ,305B","そ,305D",
        "た,305F","ち,3061","つ,3064","て,3066","と,3068",
        "な,306A","に,306B","ぬ,306C","ね,306D","の,306E",
        "は,306F","ひ,3072","ふ,3075","へ,3078","ほ,307B",
        "ま,307E","み,307F","む,3080","め,3081","も,3082",
        "や,3084","ゆ,3086","よ,3088",
        "ら,3089","り,308A","る,308B","れ,308C","ろ,308D",
        "わ,308F","を,3092","ん,3093",
        "が,304C","ぎ,304E","ぐ,3050","げ,3052","ご,3054",
        "ざ,3056","じ,3058","ず,305A","ぜ,305C","ぞ,305E",
        "だ,3060","ぢ,3062","づ,3065","で,3067","ど,3069",
        "ば,3070","び,3073","ぶ,3076","べ,3079","ぼ,307C",
        "ぱ,3071","ぴ,3074","ぷ,3077","ぺ,307A","ぽ,307D",
        "ア,30A2","イ,30A4","ウ,30A6","エ,30A8","オ,30AA",
        "カ,30AB","キ,30AD","ク,30AF","ケ,30B1","コ,30B3",
        "サ,30B5","シ,30B7","ス,30B9","セ,30BB","ソ,30BD",
        "タ,30BF","チ,30C1","ツ,30C4","テ,30C6","ト,30C8",
        "ナ,30CA","ニ,30CB","ヌ,30CC","ネ,30CD","ノ,30CE",
        "ハ,30CF","ヒ,30D2","フ,30D5","ヘ,30D8","ホ,30DB",
        "マ,30DE","ミ,30DF","ム,30E0","メ,30E1","モ,30E2",
        "ヤ,30E4","ユ,30E6","ヨ,30E8",
        "ラ,30E9","リ,30EA","ル,30EB","レ,30EC","ロ,30ED",
        "ワ,30EF","ヲ,30F2","ン,30F3",
        "ガ,30AC","ギ,30AE","グ,30B0","ゲ,30B2","ゴ,30B4",
        "ザ,30B6","ジ,30B8","ズ,30BA","ゼ,30BC","ゾ,30BE",
        "ダ,30C0","ヂ,30C2","ヅ,30C5","デ,30C7","ド,30C9",
        "バ,30D0","ビ,30D3","ブ,30D6","ベ,30D9","ボ,30DC",
        "パ,30D1","ピ,30D4","プ,30D7","ペ,30DA","ポ,30DD"
      ];

      let currentSvgDoc = null;
      let strokePaths = [];
      let strokeSamplePoints = [];
      let currentStrokeIndex = -1;
      let animationSpeed = 'normal';
      let isAnimating = false;

      // 練習モード: 'none' | 'hint' | 'check'
      let practiceMode = 'none';
      let expectedStrokeIndex = 0;
      let userDrawnPoints = [];
      let feedbackTimer = null;

      const speedDurations = { slow: 1500, normal: 600, fast: 200 };
      const DISTANCE_THRESHOLD_GOOD = 12;
      const DISTANCE_THRESHOLD_OK = 25;
      const START_DISTANCE_THRESHOLD = 30; // ヒントありモードの書き始めチェック用
      const MATCH_DISTANCE_THRESHOLD = 30; // ヒントなし：どの画に最も近いか判定する最大距離

      const selectEl = document.getElementById('charSelect');
      const showBtn = document.getElementById('showBtn');
      const svgContainer = document.getElementById('svgContainer');
      const infoText = document.getElementById('infoText');
      const feedbackText = document.getElementById('feedbackText');
      const strokeInfo = document.getElementById('strokeInfo');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const replayBtn = document.getElementById('replayBtn');
      const showAllBtn = document.getElementById('showAllBtn');
      const speedBtns = document.querySelectorAll('.speed-btn');
      const traceHintBtn = document.getElementById('traceHintBtn');
      const traceCheckBtn = document.getElementById('traceCheckBtn');
      const clearCanvasBtn = document.getElementById('clearCanvasBtn');
      let canvas, ctx;
      let isDrawing = false;

      function populateSelect() {
        kanaMap.forEach(item => {
          const [char, code] = item.split(',');
          const option = document.createElement('option');
          option.value = code;
          option.textContent = char;
          selectEl.appendChild(option);
        });
      }

      async function loadSvg(unicode) {
        try {
          const paddedCode = unicode.toLowerCase().padStart(5, '0');
          const response = await fetch(`svg/${paddedCode}.svg`);
          if (!response.ok) throw new Error('SVG not found');
          const svgText = await response.text();
          const parser = new DOMParser();
          return parser.parseFromString(svgText, 'image/svg+xml');
        } catch (err) {
          console.error(err);
          return null;
        }
      }

      function extractStrokes(svgDoc) {
        const paths = [];
        const allG = svgDoc.querySelectorAll('g');
        let strokePathsG = null;
        allG.forEach(g => {
          if ((g.getAttribute('id') || '').includes('StrokePaths')) strokePathsG = g;
        });
        if (strokePathsG) {
          const innerG = strokePathsG.querySelector('g');
          if (innerG) {
            innerG.querySelectorAll('path').forEach(p => {
              if (p.getAttribute('d')) paths.push(p);
            });
          }
        }
        if (paths.length === 0) {
          const pathElements = svgDoc.querySelectorAll('path');
          const temp = [];
          pathElements.forEach(p => {
            const m = (p.getAttribute('id') || '').match(/-s(\d+)$/);
            if (m && p.getAttribute('d')) temp.push({ path: p, num: parseInt(m[1]) });
          });
          temp.sort((a, b) => a.num - b.num);
          temp.forEach(item => paths.push(item.path));
        }
        return paths;
      }

      function samplePath(path, step = 5) {
        const points = [];
        const length = path.getTotalLength();
        if (length === 0) return points;
        let dist = 0;
        while (dist <= length) {
          const pt = path.getPointAtLength(dist);
          points.push({ x: pt.x, y: pt.y });
          dist += step;
        }
        const endPt = path.getPointAtLength(length);
        if (points.length === 0 || points[points.length-1].x !== endPt.x || points[points.length-1].y !== endPt.y) {
          points.push({ x: endPt.x, y: endPt.y });
        }
        return points;
      }

      function calculateAllSamplePoints() {
        strokeSamplePoints = strokePaths.map(path => samplePath(path, 5));
      }

      function minDistanceToPath(point, samplePoints) {
        let min = Infinity;
        for (const sp of samplePoints) {
          const dx = point.x - sp.x;
          const dy = point.y - sp.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < min) min = dist;
        }
        return min;
      }

      function averageDistance(drawnPoints, samplePoints) {
        if (drawnPoints.length === 0) return Infinity;
        const total = drawnPoints.reduce((sum, p) => sum + minDistanceToPath(p, samplePoints), 0);
        return total / drawnPoints.length;
      }

      // ユーザーが書いた点群に最も近いストロークのインデックスを返す（閾値以下で最も近いもの）
      function findClosestStrokeIndex(drawnPoints) {
        let bestIndex = -1;
        let bestAvgDist = Infinity;
        for (let i = 0; i < strokeSamplePoints.length; i++) {
          const avg = averageDistance(drawnPoints, strokeSamplePoints[i]);
          if (avg < bestAvgDist && avg < MATCH_DISTANCE_THRESHOLD) {
            bestAvgDist = avg;
            bestIndex = i;
          }
        }
        return bestIndex;
      }

      function displaySvg(svgDoc) {
        svgContainer.innerHTML = '';
        if (!svgDoc) {
          svgContainer.innerHTML = '<p style="color:#ccc;">SVGが見つかりませんでした</p>';
          return null;
        }
        const svgRoot = svgDoc.querySelector('svg');
        if (!svgRoot) {
          svgContainer.innerHTML = '<p style="color:#ccc;">無効なSVGです</p>';
          return null;
        }
        svgRoot.setAttribute('width', '200');
        svgRoot.setAttribute('height', '200');
        svgRoot.style.display = 'block';
        svgRoot.style.margin = 'auto';
        svgRoot.style.pointerEvents = 'none';
        svgRoot.querySelectorAll('path').forEach(p => {
          p.style.display = 'none';
          p.style.stroke = '#444';
          p.style.strokeWidth = '9';
          p.style.strokeLinecap = 'round';
          p.style.strokeLinejoin = 'round';
          p.style.fill = 'none';
          p.style.transition = 'none';
        });
        svgRoot.querySelectorAll('text').forEach(t => t.style.display = 'none');
        svgContainer.appendChild(svgRoot);

        const newCanvas = document.createElement('canvas');
        newCanvas.id = 'drawCanvas';
        newCanvas.style.display = 'none';
        svgContainer.appendChild(newCanvas);
        canvas = newCanvas;
        ctx = canvas.getContext('2d');
        setupCanvas();
        return svgRoot;
      }

      function setupCanvas() {
        if (!canvas) return;
        const svg = svgContainer.querySelector('svg');
        if (!svg) return;
        const viewBox = svg.getAttribute('viewBox');
        if (viewBox) {
          const parts = viewBox.split(/\s+/);
          canvas.width = parseFloat(parts[2]);
          canvas.height = parseFloat(parts[3]);
        } else {
          canvas.width = 200;
          canvas.height = 200;
        }
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#333';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }

      // --- モード切替 ---
      function enterPracticeMode(mode) {
        if (!strokePaths.length) return;
        calculateAllSamplePoints();
        practiceMode = mode;
        expectedStrokeIndex = 0;
        userDrawnPoints = [];
        // 全パスをグレー表示
        strokePaths.forEach(p => {
          p.style.display = 'block';
          p.style.stroke = '#d0d0d0';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        if (mode === 'hint') {
          updateHighlight();
          setFeedback('🔵 あおい線をなぞってね');
        } else if (mode === 'check') {
          // ヒントなしは全て同じグレー
          setFeedback('🔍 じぶんで書き順を考えてね');
        }
        canvas.style.display = 'block';
        clearCanvasBtn.style.display = 'inline-block';
        setupCanvas();
        isAnimating = false;
        updateUI();
        attachDrawEvents();
      }

      function exitPracticeMode() {
        canvas.style.display = 'none';
        clearCanvasBtn.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.stroke = '#444';
          p.style.strokeWidth = '9';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        practiceMode = 'none';
        currentStrokeIndex = -1;
        isAnimating = false;
        updateUI();
        removeDrawEvents();
        clearFeedback();
      }

      function updateHighlight() {
        if (practiceMode !== 'hint') return;
        strokePaths.forEach((p, idx) => {
          if (idx === expectedStrokeIndex) {
            p.style.stroke = '#4a90d9';
            p.style.strokeWidth = '10';
          } else {
            p.style.stroke = '#d0d0d0';
            p.style.strokeWidth = '9';
          }
        });
      }

      function setFeedback(msg, isGood = true) {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = msg;
        feedbackText.style.color = isGood ? '#2a7d2a' : '#c0392b';
        if (msg !== '🔵 あおい線をなぞってね' && msg !== '🔍 じぶんで書き順を考えてね') {
          feedbackTimer = setTimeout(() => {
            feedbackText.textContent = '';
          }, 2000);
        }
      }

      function clearFeedback() {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackText.textContent = '';
      }

      // --- 描画イベント ---
      function attachDrawEvents() {
        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointermove', onPointerMove);
        canvas.addEventListener('pointerup', onPointerUp);
        canvas.addEventListener('pointerleave', onPointerUp);
      }

      function removeDrawEvents() {
        canvas.removeEventListener('pointerdown', onPointerDown);
        canvas.removeEventListener('pointermove', onPointerMove);
        canvas.removeEventListener('pointerup', onPointerUp);
        canvas.removeEventListener('pointerleave', onPointerUp);
      }

      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      function onPointerDown(e) {
        if (practiceMode === 'none') return;
        const { x, y } = getCanvasCoords(e);
        if (practiceMode === 'hint') {
          // ヒントあり：書き始め位置が期待画かチェック
          if (expectedStrokeIndex < strokeSamplePoints.length) {
            const targetSample = strokeSamplePoints[expectedStrokeIndex];
            const dist = minDistanceToPath({x, y}, targetSample);
            if (dist > START_DISTANCE_THRESHOLD) {
              setFeedback('❌ 書き順がちがうよ！あおい線をなぞってね', false);
              isDrawing = false;
              e.preventDefault();
              return;
            }
          }
        }
        // ヒントなしは自由に書き始めOK
        isDrawing = true;
        userDrawnPoints = [{x, y}];
        ctx.beginPath();
        ctx.moveTo(x, y);
        e.preventDefault();
      }

      function onPointerMove(e) {
        if (!isDrawing || practiceMode === 'none') return;
        const { x, y } = getCanvasCoords(e);
        userDrawnPoints.push({x, y});
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        e.preventDefault();
      }

      function onPointerUp(e) {
        if (!isDrawing || practiceMode === 'none') return;
        isDrawing = false;
        ctx.beginPath();

        if (userDrawnPoints.length === 0) return;

        if (practiceMode === 'hint') {
          // ヒントあり：期待画で位置ずれ判定
          if (expectedStrokeIndex < strokeSamplePoints.length) {
            const avgDist = averageDistance(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex]);
            if (avgDist <= DISTANCE_THRESHOLD_GOOD) {
              setFeedback('🌟 じょうず！');
            } else if (avgDist <= DISTANCE_THRESHOLD_OK) {
              setFeedback('👍 まあまあ！');
            } else {
              setFeedback('💧 もうすこし！', false);
            }
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
            } else {
              updateHighlight();
              setFeedback('🔵 つぎのあおい線をなぞってね');
            }
          }
        } else if (practiceMode === 'check') {
          // ヒントなし：最も近いストロークを探す
          const closestIdx = findClosestStrokeIndex(userDrawnPoints);
          if (closestIdx === expectedStrokeIndex) {
            // 正解
            const avgDist = averageDistance(userDrawnPoints, strokeSamplePoints[expectedStrokeIndex]);
            if (avgDist <= DISTANCE_THRESHOLD_GOOD) {
              setFeedback('🌟 じょうず！');
            } else if (avgDist <= DISTANCE_THRESHOLD_OK) {
              setFeedback('👍 まあまあ！');
            } else {
              setFeedback('💧 もうすこし！', false);
            }
            expectedStrokeIndex++;
            if (expectedStrokeIndex >= strokePaths.length) {
              setFeedback('🎉 ぜんぶかけたね！すごい！');
            } else {
              setFeedback('🔍 つぎの画を書いてね');
            }
          } else {
            // 不正解：線を消してやり直し
            setFeedback('❌ 書き順がちがうよ！もういちど', false);
            // 今書いた線だけを消す（キャンバス全体をクリアする簡易実装）
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ユーザー点群もリセット
          }
        }
        userDrawnPoints = [];
        updateUI();
      }

      function clearCanvasAndRetry() {
        if (practiceMode === 'none') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        userDrawnPoints = [];
        setFeedback(practiceMode === 'hint' ? '🔵 もういちど、あおい線をなぞってね' : '🔍 もういちど書いてね');
      }

      // --- アニメーション系 ---
      function animateSingleStroke(path, duration) {
        return new Promise(resolve => {
          try {
            const length = path.getTotalLength();
            if (length === 0) { path.style.display = 'block'; resolve(); return; }
            path.style.display = 'block';
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
            path.style.transition = `stroke-dashoffset ${duration}ms ease-in-out`;
            path.getBoundingClientRect();
            path.style.strokeDashoffset = '0';
            const onEnd = () => {
              path.removeEventListener('transitionend', onEnd);
              path.style.transition = 'none';
              path.style.strokeDasharray = 'none';
              path.style.strokeDashoffset = '0';
              resolve();
            };
            path.addEventListener('transitionend', onEnd);
            setTimeout(() => {
              if (path.style.strokeDasharray !== 'none') {
                path.style.transition = 'none';
                path.style.strokeDasharray = 'none';
                path.style.strokeDashoffset = '0';
                resolve();
              }
            }, duration + 100);
          } catch (e) {
            path.style.display = 'block';
            resolve();
          }
        });
      }

      function resetAllStrokes() {
        strokePaths.forEach(p => {
          p.style.display = 'none';
          p.style.transition = 'none';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
      }

      async function animateToStroke(targetIndex) {
        if (!strokePaths.length || isAnimating || practiceMode !== 'none') return;
        targetIndex = Math.min(Math.max(targetIndex, 0), strokePaths.length - 1);
        const prevIndex = currentStrokeIndex;
        if (targetIndex <= prevIndex || prevIndex === -1) {
          resetAllStrokes();
          currentStrokeIndex = -1;
        }
        isAnimating = true;
        updateUI();
        try {
          const duration = speedDurations[animationSpeed];
          for (let i = Math.max(0, prevIndex + 1); i <= targetIndex; i++) {
            if (i <= prevIndex) continue;
            await animateSingleStroke(strokePaths[i], duration);
            currentStrokeIndex = i;
            updateUI();
          }
        } finally {
          isAnimating = false;
          updateUI();
        }
      }

      function showAllStrokesInstant() {
        if (practiceMode !== 'none') return;
        resetAllStrokes();
        strokePaths.forEach(p => {
          p.style.display = 'block';
          p.style.strokeDasharray = 'none';
          p.style.strokeDashoffset = '0';
        });
        currentStrokeIndex = strokePaths.length - 1;
        isAnimating = false;
        updateUI();
      }

      function updateUI() {
        if (!strokePaths.length) {
          infoText.textContent = 'ストロークが見つかりません';
          strokeInfo.textContent = '';
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          return;
        }
        // 練習モード中
        if (practiceMode === 'hint' || practiceMode === 'check') {
          infoText.textContent = `✏️ なぞり中：${expectedStrokeIndex + 1} / ${strokePaths.length} 画め`;
          strokeInfo.textContent = `全 ${strokePaths.length} 画`;
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          replayBtn.disabled = true;
          showAllBtn.disabled = true;
          traceHintBtn.textContent = (practiceMode === 'hint') ? '🔙 もどる' : '🖊 なぞり練習';
          traceCheckBtn.textContent = (practiceMode === 'check') ? '🔙 もどる' : '🔍 書き順チェック';
          return;
        }
        // 通常アニメーションモード
        const total = strokePaths.length;
        const current = currentStrokeIndex + 1;
        infoText.textContent = `✏️ ${current} / ${total} 画`;
        strokeInfo.textContent = `全 ${total} 画`;
        prevBtn.disabled = (currentStrokeIndex <= 0) || isAnimating;
        nextBtn.disabled = (currentStrokeIndex >= total - 1) || isAnimating;
        replayBtn.disabled = isAnimating;
        showAllBtn.disabled = isAnimating;
        traceHintBtn.textContent = '🖊 なぞり練習';
        traceCheckBtn.textContent = '🔍 書き順チェック';
        traceHintBtn.disabled = false;
        traceCheckBtn.disabled = false;
      }

      async function loadAndDisplay(unicode) {
        if (practiceMode !== 'none') exitPracticeMode();
        isAnimating = false;
        const svgDoc = await loadSvg(unicode);
        currentSvgDoc = svgDoc;
        if (!svgDoc) {
          svgContainer.innerHTML = '<p style="color:#ccc;">SVGが見つかりませんでした</p>';
          strokePaths = [];
          updateUI();
          return;
        }
        strokePaths = extractStrokes(svgDoc);
        displaySvg(svgDoc);
        if (strokePaths.length > 0) {
          currentStrokeIndex = -1;
          animateToStroke(0);
        } else {
          updateUI();
        }
      }

      // --- イベントリスナー ---
      showBtn.addEventListener('click', () => {
        if (selectEl.value) loadAndDisplay(selectEl.value);
      });

      nextBtn.addEventListener('click', () => {
        if (practiceMode === 'none' && !isAnimating && currentStrokeIndex < strokePaths.length - 1) {
          animateToStroke(currentStrokeIndex + 1);
        }
      });

      prevBtn.addEventListener('click', () => {
        if (practiceMode === 'none' && !isAnimating && currentStrokeIndex > 0) {
          animateToStroke(currentStrokeIndex - 1);
        }
      });

      replayBtn.addEventListener('click', () => {
        if (practiceMode === 'none' && strokePaths.length && !isAnimating) {
          resetAllStrokes();
          currentStrokeIndex = -1;
          updateUI();
          animateToStroke(0);
        }
      });

      showAllBtn.addEventListener('click', () => {
        if (practiceMode === 'none' && strokePaths.length && !isAnimating) {
          showAllStrokesInstant();
        }
      });

      traceHintBtn.addEventListener('click', () => {
        if (practiceMode === 'hint') {
          exitPracticeMode();
        } else if (practiceMode === 'check') {
          // チェックモード中は一度戻ってからヒントモードへ
          exitPracticeMode();
          enterPracticeMode('hint');
        } else {
          enterPracticeMode('hint');
        }
      });

      traceCheckBtn.addEventListener('click', () => {
        if (practiceMode === 'check') {
          exitPracticeMode();
        } else if (practiceMode === 'hint') {
          exitPracticeMode();
          enterPracticeMode('check');
        } else {
          enterPracticeMode('check');
        }
      });

      clearCanvasBtn.addEventListener('click', clearCanvasAndRetry);

      document.addEventListener('keydown', (e) => {
        if (practiceMode !== 'none' || isAnimating) return;
        if (e.key === 'ArrowRight' && currentStrokeIndex < strokePaths.length - 1) {
          e.preventDefault();
          animateToStroke(currentStrokeIndex + 1);
        } else if (e.key === 'ArrowLeft' && currentStrokeIndex > 0) {
          e.preventDefault();
          animateToStroke(currentStrokeIndex - 1);
        }
      });

      speedBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          speedBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          animationSpeed = this.dataset.speed;
        });
      });

      function init() {
        populateSelect();
        if (kanaMap.length) {
          selectEl.value = kanaMap[0].split(',')[1];
          loadAndDisplay(selectEl.value);
        }
      }

      init();
    })();
  </script>
</body>
</html>
